<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The Legend of &Ouml;tzi the Iceman</title>
  <style>
:root { color-scheme: dark; --ink:#f3ead7; --muted:#c1b69f; --line:#384338; --accent:#e7bd6c; --green:#8fc0a9; }
* { box-sizing: border-box; }
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#080b0a; color:var(--ink); font:14px/1.4 system-ui,-apple-system,Segoe UI,sans-serif; }
body { overscroll-behavior:none; }
#app { position:fixed; inset:0; width:100vw; height:100dvh; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); display:grid; grid-template-rows:minmax(0,1fr) auto auto; grid-template-areas:"game" "hud" "controls"; touch-action:none; user-select:none; -webkit-user-select:none; background:#080b0a; }
#worldCanvas { grid-area:game; display:block; width:100%; height:100%; min-height:0; image-rendering:pixelated; background:#102016; }
#uiRoot { display:contents; pointer-events:none; }
button { pointer-events:auto; border:1px solid rgba(243,234,215,.24); border-radius:8px; background:#1d251f; color:var(--ink); font-weight:800; min-width:44px; min-height:44px; }
.game-shell { grid-area:game; position:relative; min-height:0; overflow:hidden; pointer-events:none; }
.start-panel { position:absolute; inset:0; display:grid; place-content:center; gap:12px; padding:24px; text-align:center; background:linear-gradient(180deg,rgba(8,11,10,.84),rgba(8,11,10,.54)); pointer-events:auto; z-index:5; }
.start-panel[hidden] { display:none; }
.start-panel h1 { margin:0; font-size:clamp(28px,8vw,52px); letter-spacing:0; }
.start-panel p { margin:0; color:var(--muted); }
#startBtn { padding:12px 18px; background:#513d1e; border-color:#a88345; }
.hud-strip { grid-area:hud; min-height:54px; display:grid; grid-template-columns:auto auto minmax(0,1fr) 52px 48px; align-items:center; gap:8px; padding:8px 10px; border-top:1px solid rgba(243,234,215,.18); border-bottom:1px solid rgba(0,0,0,.45); background:linear-gradient(180deg,#111812,#0b110d); pointer-events:auto; }
.stat-chip { padding:5px 8px; border:1px solid rgba(143,192,169,.4); border-radius:8px; background:rgba(9,18,14,.72); color:#c7f0dc; font:800 12px ui-monospace,Consolas,monospace; white-space:nowrap; }
#inventoryChip { white-space:normal; line-height:1.12; max-width:260px; }
.status-line { min-width:0; color:#ffe3a5; font-weight:800; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#mapTab { width:52px; min-width:52px; height:42px; min-height:42px; background:#142820; border-color:rgba(143,192,169,.5); }
#debugBtn { width:46px; }
.debug-panel { grid-area:hud; align-self:end; justify-self:stretch; margin:0 10px 3px; padding:5px 8px; border:1px solid rgba(231,189,108,.35); border-radius:8px; background:rgba(0,0,0,.74); color:#ffe6a8; font:10px ui-monospace,Consolas,monospace; pointer-events:none; z-index:6; }
.minimap-panel { position:absolute; right:8px; top:56px; width:120px; padding:6px; border:1px solid rgba(143,192,169,.45); border-radius:8px; background:rgba(5,12,9,.82); box-shadow:0 10px 30px rgba(0,0,0,.32); pointer-events:none; z-index:3; }
.minimap-panel[hidden] { display:none; }
.minimap-panel canvas { display:block; width:104px; height:104px; border:1px solid rgba(243,234,215,.16); image-rendering:pixelated; }
.panel-title { margin:0 0 5px; color:#e7bd6c; font-size:11px; font-weight:900; letter-spacing:.06em; }
.menu-panel { position:fixed; left:50%; top:45%; transform:translate(-50%,-50%); width:min(340px,calc(100vw - 28px)); padding:14px; border:1px solid rgba(231,189,108,.5); border-radius:8px; background:rgba(12,15,13,.94); box-shadow:0 20px 70px rgba(0,0,0,.55); pointer-events:auto; z-index:10; }
.menu-panel[hidden] { display:none; }
.menu-panel p { margin:4px 0 12px; color:var(--ink); }
.menu-panel dl { margin:0 0 12px; display:grid; gap:6px; }
.menu-panel dl div { display:flex; justify-content:space-between; gap:16px; border-bottom:1px solid rgba(243,234,215,.1); padding-bottom:4px; }
.menu-panel dt { color:var(--muted); }
.menu-panel dd { margin:0; font-weight:800; }
.menu-panel button { width:100%; background:#513d1e; border-color:#a88345; }
.controls { grid-area:controls; position:relative; min-height:180px; height:min(29dvh,232px); padding:12px 10px max(12px,env(safe-area-inset-bottom)); border-top:1px solid rgba(243,234,215,.16); background:linear-gradient(180deg,#111812,#070a08); pointer-events:none; }
.stick-zone { position:absolute; left:16px; top:26px; width:132px; height:132px; pointer-events:auto; touch-action:none; }
.stick-label { position:absolute; left:0; top:-20px; color:var(--muted); font-size:11px; font-weight:800; }
.stick-base { position:absolute; inset:10px; border:2px solid rgba(243,234,215,.25); border-radius:50%; background:rgba(11,16,13,.56); }
.stick-knob { position:absolute; left:50%; top:50%; width:46px; height:46px; margin:-23px 0 0 -23px; border-radius:50%; background:var(--accent); box-shadow:0 7px 20px rgba(0,0,0,.4); }
.action-cluster { position:absolute; right:14px; top:22px; display:grid; grid-template-columns:86px 86px; gap:8px; pointer-events:auto; }
.action-cluster button { height:58px; font-size:12px; }
#useBtn { grid-column:span 2; background:#513d1e; border-color:#a88345; }
@media (min-width: 720px) { .controls { min-height:188px; } .stick-zone { left:calc(50% - 250px); } .action-cluster { right:calc(50% - 250px); } }
</style>

<body>
  <div id="app">
    <canvas id="worldCanvas" aria-label="The Legend of &Ouml;tzi the Iceman game world"></canvas>
    <div id="uiRoot"></div>
  </div>
  <script>
/* AI-SAFE SINGLE-FILE CONSTITUTION
   Named section edits only in src modules.
   INPUT -> ACTIONS -> SIMULATION -> RENDER one-way flow.
   Render must not mutate gameplay state.
   No runtime external dependencies.
   SAVE_VERSION changes require migration.
   Test harness is exposed only as window.__OTZI_TEST__.
*/

/* MODULE: config.js */
/* SECTION 01: CONFIG */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.CFG = {
  engineVersion: "otzi-milestone1-0.1.0",
  saveVersion: 1,
  worldgenVersion: 1,
  saveKey: "otzi_milestone1_save_v1",
  defaultSeed: "otzi-m1",
  tileSize: 24,
  mapW: 72,
  mapH: 72,
  fixedDt: 1 / 60,
  maxStepsPerFrame: 5,
  playerSpeed: 118,
  sprintSpeed: 166,
  gatherRadius: 42,
  resourceNodeRadius: 42,
  dprCap: 2
};


/* MODULE: dom.js */
/* SECTION 00: DOM */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.dom = {
  init() {
    this.app = document.getElementById("app");
    this.canvas = document.getElementById("worldCanvas");
    this.uiRoot = document.getElementById("uiRoot");
    this.ctx = this.canvas.getContext("2d", { alpha: false });
    this.uiRoot.innerHTML = `
      <section id="gameShell" class="game-shell" aria-label="Game viewport">
        <div id="minimapPanel" class="minimap-panel" hidden aria-label="Trail map preview">
          <div class="panel-title">TRAIL MAP</div>
          <canvas id="minimapCanvas" width="104" height="104" aria-hidden="true"></canvas>
        </div>
        <div class="start-panel" id="startPanel">
          <h1>The Legend of &Ouml;tzi the Iceman</h1>
          <p>Canvas 2D survival adventure engine shell.</p>
          <button id="startBtn" type="button">Start / Audio Unlock</button>
        </div>
      </section>
      <section id="hudStrip" class="hud-strip" aria-label="Stats and status">
        <div id="inventoryChip" class="stat-chip">FLINT: 0</div>
        <div id="staminaChip" class="stat-chip">STAM: 100</div>
        <div id="statusLine" class="status-line">Milestone 1 engine shell</div>
        <button id="mapTab" type="button" aria-label="Trail map">MAP</button>
        <button id="debugBtn" type="button" aria-label="Toggle debug">D</button>
      </section>
      <div id="debugPanel" class="debug-panel" hidden></div>
      <section class="controls" id="controls" aria-label="Touch controls">
        <div class="stick-zone" id="moveZone" aria-label="MOVE joystick">
          <div class="stick-label">MOVE</div>
          <div class="stick-base"><div class="stick-knob" id="stickKnob"></div></div>
        </div>
        <div class="action-cluster">
          <button id="useBtn" type="button">USE<br>GATHER</button>
          <button id="sprintBtn" type="button">DODGE<br>SPRINT</button>
          <button id="menuBtn" type="button">CRAFT<br>MENU</button>
        </div>
      </section>
      <div id="menuPanel" class="menu-panel" hidden role="dialog" aria-modal="false" aria-label="Craft and menu placeholder">
        <div class="panel-title">CRAFT / MENU</div>
        <p>Craft/Menu placeholder &mdash; control path works.</p>
        <dl>
          <div><dt>Seed</dt><dd id="menuSeed">-</dd></div>
          <div><dt>Flint</dt><dd id="menuFlint">0</dd></div>
          <div><dt>Stamina</dt><dd id="menuStamina">100</dd></div>
        </dl>
        <button id="menuCloseBtn" type="button">Close</button>
      </div>
    `;
    this.startPanel = document.getElementById("startPanel");
    this.startBtn = document.getElementById("startBtn");
    this.debugBtn = document.getElementById("debugBtn");
    this.debugPanel = document.getElementById("debugPanel");
    this.inventoryChip = document.getElementById("inventoryChip");
    this.staminaChip = document.getElementById("staminaChip");
    this.hudStrip = document.getElementById("hudStrip");
    this.gameShell = document.getElementById("gameShell");
    this.minimapPanel = document.getElementById("minimapPanel");
    this.minimapCanvas = document.getElementById("minimapCanvas");
    this.minimapCtx = this.minimapCanvas.getContext("2d", { alpha: false });
    this.menuPanel = document.getElementById("menuPanel");
    this.menuSeed = document.getElementById("menuSeed");
    this.menuFlint = document.getElementById("menuFlint");
    this.menuStamina = document.getElementById("menuStamina");
    this.menuCloseBtn = document.getElementById("menuCloseBtn");
    this.statusLine = document.getElementById("statusLine");
    this.moveZone = document.getElementById("moveZone");
    this.stickKnob = document.getElementById("stickKnob");
    this.useBtn = document.getElementById("useBtn");
    this.sprintBtn = document.getElementById("sprintBtn");
    this.menuBtn = document.getElementById("menuBtn");
    this.mapTab = document.getElementById("mapTab");
  }
};


/* MODULE: rng.js */
/* SECTION 02: RNG */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.rng = {
  hashSeed(seed) {
    let h = 2166136261;
    const s = String(seed || "seed");
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  },
  make(seed) {
    let state = this.hashSeed(seed) || 1;
    return {
      next() {
        state |= 0;
        state = (state + 0x6d2b79f5) | 0;
        let t = Math.imul(state ^ (state >>> 15), 1 | state);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      },
      range(min, max) {
        return min + this.next() * (max - min);
      },
      int(min, max) {
        return Math.floor(this.range(min, max + 1));
      }
    };
  }
};


/* MODULE: viewport.js */
/* SECTION 03: VIEWPORT */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.viewport = {
  cssW: 0,
  cssH: 0,
  dpr: 1,
  internalW: 0,
  internalH: 0,
  init() {
    const resize = () => this.resize();
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 80));
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resize);
      window.visualViewport.addEventListener("scroll", resize);
    }
    this.resize();
  },
  resize() {
    const canvas = OTZI.dom.canvas;
    const rect = canvas.getBoundingClientRect();
    this.cssW = Math.max(1, Math.floor(rect.width));
    this.cssH = Math.max(1, Math.floor(rect.height));
    this.dpr = Math.min(OTZI.CFG.dprCap, window.devicePixelRatio || 1);
    this.internalW = Math.max(1, Math.floor(this.cssW * this.dpr));
    this.internalH = Math.max(1, Math.floor(this.cssH * this.dpr));
    if (canvas.width !== this.internalW || canvas.height !== this.internalH) {
      canvas.width = this.internalW;
      canvas.height = this.internalH;
    }
    const ctx = OTZI.dom.ctx;
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
};


/* MODULE: input.js */
/* SECTION 04A: INPUT */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.input = {
  keys: new Set(),
  pointers: new Map(),
  moveVector: { x: 0, y: 0 },
  pressed: { use: false, sprint: false, menu: false, debug: false, map: false },
  sprintHeld: false,
  init() {
    window.addEventListener("keydown", (ev) => {
      this.keys.add(ev.code);
      if (ev.code === "KeyD") this.pressed.debug = true;
      if (ev.code === "KeyE" || ev.code === "Space") this.pressed.use = true;
      if (ev.code === "KeyM") this.pressed.map = true;
      if (ev.code === "Escape" && OTZI.game.menuOpen) {
        OTZI.game.menuOpen = false;
        this.clearAll();
        OTZI.dialogue.toast("Craft/Menu closed");
      }
      if (ev.code === "KeyR") OTZI.game.setSeed("otzi-" + Date.now().toString(36));
    });
    window.addEventListener("keyup", (ev) => this.keys.delete(ev.code));
    window.addEventListener("blur", () => this.clearAll());
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) this.clearAll();
    });
    window.addEventListener("orientationchange", () => this.clearAll());
    this.bindMoveZone();
    this.bindButton(OTZI.dom.useBtn, "use");
    this.bindButton(OTZI.dom.sprintBtn, "sprint");
    this.bindButton(OTZI.dom.menuBtn, "menu");
    this.bindButton(OTZI.dom.debugBtn, "debug");
    this.bindButton(OTZI.dom.mapTab, "map");
  },
  bindButton(el, name) {
    el.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      el.setPointerCapture?.(ev.pointerId);
      this.pressed[name] = true;
      if (name === "sprint") this.sprintHeld = true;
    });
    const clear = (ev) => {
      ev.preventDefault();
      el.releasePointerCapture?.(ev.pointerId);
      if (name === "sprint") this.sprintHeld = false;
    };
    el.addEventListener("pointerup", clear);
    el.addEventListener("pointercancel", clear);
    el.addEventListener("lostpointercapture", clear);
  },
  bindMoveZone() {
    const zone = OTZI.dom.moveZone;
    const update = (ev) => {
      const rect = zone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = ev.clientX - cx;
      const dy = ev.clientY - cy;
      const mag = Math.hypot(dx, dy);
      const max = Math.max(24, Math.min(rect.width, rect.height) * 0.32);
      const scale = mag > max ? max / mag : 1;
      this.moveVector.x = Math.max(-1, Math.min(1, dx / max));
      this.moveVector.y = Math.max(-1, Math.min(1, dy / max));
      OTZI.dom.stickKnob.style.transform = `translate(${dx * scale}px, ${dy * scale}px)`;
    };
    const clear = () => {
      this.moveVector.x = 0;
      this.moveVector.y = 0;
      OTZI.dom.stickKnob.style.transform = "translate(0, 0)";
    };
    zone.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      zone.setPointerCapture?.(ev.pointerId);
      this.pointers.set(ev.pointerId, "move");
      update(ev);
    });
    zone.addEventListener("pointermove", (ev) => {
      if (this.pointers.get(ev.pointerId) === "move") update(ev);
    });
    for (const type of ["pointerup", "pointercancel", "lostpointercapture"]) {
      zone.addEventListener(type, (ev) => {
        this.pointers.delete(ev.pointerId);
        clear();
      });
    }
  },
  consumePressed() {
    const out = { ...this.pressed };
    this.pressed.use = false;
    this.pressed.sprint = false;
    this.pressed.menu = false;
    this.pressed.debug = false;
    this.pressed.map = false;
    return out;
  },
  clearAll() {
    this.pointers.clear();
    this.moveVector.x = 0;
    this.moveVector.y = 0;
    this.sprintHeld = false;
    for (const key of Object.keys(this.pressed)) this.pressed[key] = false;
    OTZI.dom.stickKnob.style.transform = "translate(0, 0)";
  }
};


/* MODULE: action-map.js */
/* SECTION 04B: ACTION MAP */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.actionMap = {
  sample() {
    const input = OTZI.input;
    let x = input.moveVector.x;
    let y = input.moveVector.y;
    if (input.keys.has("ArrowLeft") || input.keys.has("KeyA")) x -= 1;
    if (input.keys.has("ArrowRight") || input.keys.has("KeyD")) x += 1;
    if (input.keys.has("ArrowUp") || input.keys.has("KeyW")) y -= 1;
    if (input.keys.has("ArrowDown") || input.keys.has("KeyS")) y += 1;
    const mag = Math.hypot(x, y);
    if (mag > 1) {
      x /= mag;
      y /= mag;
    }
    const pressed = input.consumePressed();
    return {
      moveX: x,
      moveY: y,
      sprint: input.sprintHeld || input.keys.has("ShiftLeft") || input.keys.has("ShiftRight"),
      sprintPressed: pressed.sprint,
      usePressed: pressed.use,
      menuPressed: pressed.menu,
      debugPressed: pressed.debug,
      mapPressed: pressed.map
    };
  }
};


/* MODULE: audio.js */
/* SECTION 05: AUDIO */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.audio = {
  ctx: null,
  unlocked: false,
  async unlock() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state !== "running") await this.ctx.resume();
    this.unlocked = true;
    this.blip(440, 0.055);
  },
  blip(freq, seconds) {
    if (!this.ctx || !this.unlocked) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.045, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + seconds);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(now);
    osc.stop(now + seconds + 0.02);
  }
};


/* MODULE: assets.js */
/* SECTION 06: ASSETS */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.assets = {
  palette: {
    grass: "#2f5635",
    darkGrass: "#24452d",
    path: "#806545",
    water: "#2d6f86",
    snow: "#d9d7c8",
    tree: "#17321f",
    rock: "#686d66",
    player: "#d7a85d",
    deer: "#a87949"
  },
  init() {
    this.ready = true;
  }
};


/* MODULE: tilemap.js */
/* SECTION 07A: TILEMAP */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.TILE = {
  GRASS: 0,
  DARK_GRASS: 1,
  PATH: 2,
  WATER: 3,
  SNOW: 4,
  TREE: 5,
  ROCK: 6,
  DEPLETED: 7,
  DEADWOOD: 8,
  STONE: 9,
  BIRCH: 10,
  GRASS_CLUMP: 11,
  BERRY: 12
};
OTZI.FLAG = { BLOCKED: 1, HARVEST: 2, VILLAGE: 4 };

OTZI.tilemap = {
  create(w, h) {
    return {
      w,
      h,
      ground: new Uint8Array(w * h),
      flags: new Uint8Array(w * h),
      idx(x, y) { return y * this.w + x; },
      inside(x, y) { return x >= 0 && y >= 0 && x < this.w && y < this.h; },
      getGround(x, y) { return this.inside(x, y) ? this.ground[this.idx(x, y)] : OTZI.TILE.WATER; },
      setGround(x, y, v) { if (this.inside(x, y)) this.ground[this.idx(x, y)] = v; },
      getFlags(x, y) { return this.inside(x, y) ? this.flags[this.idx(x, y)] : OTZI.FLAG.BLOCKED; },
      setFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] = v; },
      addFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] |= v; },
      clearFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] &= ~v; }
    };
  }
};


/* MODULE: worldgen.js */
/* SECTION 07B: WORLDGEN */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.worldgen = {
  generate(seed) {
    const cfg = OTZI.CFG;
    const map = OTZI.tilemap.create(cfg.mapW, cfg.mapH);
    const rng = OTZI.rng.make(seed + ":world:" + cfg.worldgenVersion);
    const cx = Math.floor(cfg.mapW / 2);
    const cy = Math.floor(cfg.mapH / 2);

    for (let y = 0; y < cfg.mapH; y++) {
      for (let x = 0; x < cfg.mapW; x++) {
        const edge = Math.min(x, y, cfg.mapW - 1 - x, cfg.mapH - 1 - y);
        const d = Math.hypot(x - cx, y - cy);
        let ground = OTZI.TILE.GRASS;
        if (edge < 2) ground = OTZI.TILE.WATER;
        else if (d > 30 && rng.next() < 0.55) ground = OTZI.TILE.SNOW;
        else if (rng.next() < 0.16) ground = OTZI.TILE.DARK_GRASS;
        map.setGround(x, y, ground);
        if (ground === OTZI.TILE.WATER) map.addFlags(x, y, OTZI.FLAG.BLOCKED);
      }
    }

    for (let x = 5; x < cfg.mapW - 5; x++) map.setGround(x, cy, OTZI.TILE.PATH);
    for (let y = 5; y < cfg.mapH - 5; y++) map.setGround(cx, y, OTZI.TILE.PATH);

    const resourceTiles = [
      OTZI.TILE.TREE,
      OTZI.TILE.ROCK,
      OTZI.TILE.DEADWOOD,
      OTZI.TILE.STONE,
      OTZI.TILE.BIRCH,
      OTZI.TILE.GRASS_CLUMP,
      OTZI.TILE.BERRY
    ];
    for (let i = 0; i < 380; i++) {
      const x = rng.int(3, cfg.mapW - 4);
      const y = rng.int(3, cfg.mapH - 4);
      if (Math.abs(x - cx) < 4 || Math.abs(y - cy) < 4) continue;
      const tile = resourceTiles[rng.int(0, resourceTiles.length)];
      map.setGround(x, y, tile);
      map.addFlags(x, y, OTZI.FLAG.HARVEST);
      if (tile !== OTZI.TILE.GRASS_CLUMP && tile !== OTZI.TILE.BERRY) {
        map.addFlags(x, y, OTZI.FLAG.BLOCKED);
      }
    }

    for (let y = cy - 3; y <= cy + 3; y++) {
      for (let x = cx - 3; x <= cx + 3; x++) {
        map.setGround(x, y, OTZI.TILE.PATH);
        map.setFlags(x, y, OTZI.FLAG.VILLAGE);
      }
    }
    return map;
  }
};

var OTZI = window.OTZI || (window.OTZI = {});

OTZI.entities = {
  makePlayer() {

      wetness: 0
    };
  },
  spawnWorld(seed) {

    const out = [];
    for (let i = 0; i < 12; i++) {
      out.push({
        id: "deer-" + i,
        kind: "deer",
        x: rng.range(8, OTZI.CFG.mapW - 8) * OTZI.CFG.tileSize,
        y: rng.range(8, OTZI.CFG.mapH - 8) * OTZI.CFG.tileSize,

      });
    }
    return out;
  },
  update(dt) {
    const game = OTZI.game;
    for (const e of game.entities) {
      if (e.kind !== "deer") continue;
      e.phase += dt;
      const dx = Math.cos(e.phase * 0.7) * 8 * dt;
      const dy = Math.sin(e.phase * 0.9) * 8 * dt;
      const moved = OTZI.collision.moveCircle(e, dx, dy);
      e.x = moved.x;
      e.y = moved.y;
    }
  }
};


/* MODULE: resources.js */
/* SECTION 08B: RESOURCES */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.resources = {
  createFromMap(seed, map) {
    const nodes = [];
    const ts = OTZI.CFG.tileSize;
    for (let y = 0; y < map.h; y++) {
      for (let x = 0; x < map.w; x++) {
        if (!(map.getFlags(x, y) & OTZI.FLAG.HARVEST)) continue;
        const resource = this.resourceForTile(map.getGround(x, y));
        if (!resource) continue;
        nodes.push({
          id: `node_${seed}_${x}_${y}_${resource}`.replace(/[^a-zA-Z0-9_-]/g, "_"),
          kind: "resource",
          resource,
          x: (x + 0.5) * ts,
          y: (y + 0.5) * ts,
          tileX: x,
          tileY: y,
          radius: OTZI.CFG.resourceNodeRadius,
          amount: 1,
          depleted: false,
          respawn: "none",
          saveDeltaId: `${x},${y}:${resource}`,
          saveable: true
        });
      }
    }
    return nodes;
  },
  resourceForTile(tile) {
    if (tile === OTZI.TILE.ROCK) return "flint";
    if (tile === OTZI.TILE.DEADWOOD) return "stick";
    if (tile === OTZI.TILE.STONE) return "stone";
    if (tile === OTZI.TILE.BIRCH) return "bark";
    if (tile === OTZI.TILE.GRASS_CLUMP) return "grass";
    if (tile === OTZI.TILE.BERRY) return "food";
    return null;
  },
  findNearest(nodes, player, resourceType = null) {
    let best = null;
    for (const node of nodes) {
      if (node.depleted) continue;
      if (resourceType && node.resource !== resourceType) continue;
      const dist = Math.hypot(node.x - player.x, node.y - player.y);
      const range = Math.max(node.radius, OTZI.CFG.gatherRadius);
      if (dist <= range && (!best || dist < best.dist)) best = { ...node, dist };
    }
    return best;
  },
  getById(nodes, id) {
    return nodes.find((node) => node.id === id) || null;
  },
  deplete(node, map) {
    node.depleted = true;
    node.amount = 0;
    map.setGround(node.tileX, node.tileY, OTZI.TILE.DEPLETED);
    map.clearFlags(node.tileX, node.tileY, OTZI.FLAG.HARVEST | OTZI.FLAG.BLOCKED);
  },
  count(nodes) {
    return nodes.reduce((acc, node) => {
      const bucket = node.depleted ? "depleted" : "active";
      acc.total++;
      acc[bucket]++;
      acc.byResource[node.resource] = acc.byResource[node.resource] || { total: 0, active: 0, depleted: 0 };
      acc.byResource[node.resource].total++;
      acc.byResource[node.resource][bucket]++;
      return acc;
    }, { total: 0, active: 0, depleted: 0, byResource: {} });
  }
};



/* MODULE: collision.js */
/* SECTION 08B: COLLISION */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.collision = {
  blockedAtWorld(x, y) {
    const ts = OTZI.CFG.tileSize;
    const tx = Math.floor(x / ts);
    const ty = Math.floor(y / ts);
    return !!(OTZI.game.map.getFlags(tx, ty) & OTZI.FLAG.BLOCKED);
  },
  moveCircle(entity, dx, dy) {
    let nx = entity.x + dx;
    let ny = entity.y;
    if (!this.circleBlocked(nx, ny, entity.radius)) entity.x = nx;
    nx = entity.x;
    ny = entity.y + dy;
    if (!this.circleBlocked(nx, ny, entity.radius)) entity.y = ny;
    return { x: entity.x, y: entity.y };
  },
  circleBlocked(x, y, r) {
    return this.blockedAtWorld(x - r, y - r) ||
      this.blockedAtWorld(x + r, y - r) ||
      this.blockedAtWorld(x - r, y + r) ||
      this.blockedAtWorld(x + r, y + r);
  }
};

    const ctx = OTZI.dom.ctx;

    const cam = OTZI.camera;
    const cfg = OTZI.CFG;
    const map = OTZI.game.map;
    const pal = OTZI.assets.palette;
    ctx.fillStyle = "#0b0e0d";
    ctx.fillRect(0, 0, vp.cssW, vp.cssH);

    const startX = Math.max(0, Math.floor(cam.x / cfg.tileSize) - 1);
    const startY = Math.max(0, Math.floor(cam.y / cfg.tileSize) - 1);
    const endX = Math.min(map.w - 1, Math.ceil((cam.x + vp.cssW) / cfg.tileSize) + 1);
    const endY = Math.min(map.h - 1, Math.ceil((cam.y + vp.cssH) / cfg.tileSize) + 1);

    for (let y = startY; y <= endY; y++) {
      for (let x = startX; x <= endX; x++) {
        const t = map.getGround(x, y);
        ctx.fillStyle = t === OTZI.TILE.WATER ? pal.water :
          t === OTZI.TILE.SNOW ? pal.snow :
          t === OTZI.TILE.PATH ? pal.path :
          t === OTZI.TILE.TREE ? pal.tree :
          t === OTZI.TILE.ROCK ? pal.rock :
          t === OTZI.TILE.DEADWOOD ? "#6b4a2f" :
          t === OTZI.TILE.STONE ? "#545a55" :
          t === OTZI.TILE.BIRCH ? "#d8d3ba" :
          t === OTZI.TILE.GRASS_CLUMP ? "#6faa42" :
          t === OTZI.TILE.BERRY ? "#315b36" :
          t === OTZI.TILE.DEPLETED ? "#4d4b3d" :
          t === OTZI.TILE.DARK_GRASS ? pal.darkGrass : pal.grass;
        ctx.fillRect(x * cfg.tileSize - cam.x, y * cfg.tileSize - cam.y, cfg.tileSize, cfg.tileSize);
        if (t === OTZI.TILE.TREE) {
          ctx.fillStyle = "#102516";
          ctx.fillRect(x * cfg.tileSize - cam.x + 6, y * cfg.tileSize - cam.y + 4, 12, 17);
        }
        if (t === OTZI.TILE.ROCK) {
          ctx.fillStyle = "#8b8d83";
          ctx.fillRect(x * cfg.tileSize - cam.x + 5, y * cfg.tileSize - cam.y + 7, 14, 10);
        }
        if (t === OTZI.TILE.DEADWOOD) {
          ctx.fillStyle = "#9b6b3e";
          ctx.fillRect(x * cfg.tileSize - cam.x + 4, y * cfg.tileSize - cam.y + 13, 16, 5);
        }
        if (t === OTZI.TILE.STONE) {
          ctx.fillStyle = "#a5aaa0";
          ctx.fillRect(x * cfg.tileSize - cam.x + 7, y * cfg.tileSize - cam.y + 9, 10, 8);
        }
        if (t === OTZI.TILE.BIRCH) {
          ctx.fillStyle = "#f1ead0";
          ctx.fillRect(x * cfg.tileSize - cam.x + 9, y * cfg.tileSize - cam.y + 4, 7, 18);
          ctx.fillStyle = "#332d24";
          ctx.fillRect(x * cfg.tileSize - cam.x + 10, y * cfg.tileSize - cam.y + 8, 5, 2);
        }
        if (t === OTZI.TILE.GRASS_CLUMP) {
          ctx.fillStyle = "#9bd35e";
          ctx.fillRect(x * cfg.tileSize - cam.x + 5, y * cfg.tileSize - cam.y + 13, 3, 7);
          ctx.fillRect(x * cfg.tileSize - cam.x + 11, y * cfg.tileSize - cam.y + 9, 3, 11);
          ctx.fillRect(x * cfg.tileSize - cam.x + 17, y * cfg.tileSize - cam.y + 12, 3, 8);
        }
        if (t === OTZI.TILE.BERRY) {
          ctx.fillStyle = "#233a20";
          ctx.fillRect(x * cfg.tileSize - cam.x + 5, y * cfg.tileSize - cam.y + 7, 14, 12);
          ctx.fillStyle = "#c43d4b";
          ctx.fillRect(x * cfg.tileSize - cam.x + 9, y * cfg.tileSize - cam.y + 9, 3, 3);
          ctx.fillRect(x * cfg.tileSize - cam.x + 14, y * cfg.tileSize - cam.y + 13, 3, 3);
        }
        if (t === OTZI.TILE.DEPLETED) {
          ctx.fillStyle = "rgba(0,0,0,.22)";
          ctx.fillRect(x * cfg.tileSize - cam.x + 7, y * cfg.tileSize - cam.y + 9, 10, 6);
        }
      }
    }

    for (const e of OTZI.game.entities) this.drawEntity(ctx, e, pal.deer);
    this.drawEntity(ctx, OTZI.game.player, pal.player);
    if (OTZI.game.debug) OTZI.debug.draw(ctx, startX, startY, endX, endY);
  },
  drawEntity(ctx, e, color) {
    const p = OTZI.camera.worldToScreen(e.x, e.y);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.fillRect(p.x - e.radius, p.y + e.radius + 2, e.radius * 2, 3);
  }
};

        const dist = Math.hypot(node.x - px, node.y - py);
        if (!best || dist < best.dist) best = { ...node, dist };
      }
      if (best) {
        OTZI.game.player.x = best.x - ts * 0.9;
        OTZI.game.player.y = best.y;
        OTZI.camera.update();
      }
      return best;
    },
    teleportToResource(id) {
      const node = OTZI.resources.getById(OTZI.game.resourceNodes, id);
      if (!node) return null;
      OTZI.game.player.x = node.x - OTZI.CFG.tileSize * 0.9;
      OTZI.game.player.y = node.y;
      OTZI.camera.update();
      return { ...node };
    },
    resourceNode(id) {
      const node = OTZI.resources.getById(OTZI.game.resourceNodes, id);
      return node ? { ...node } : null;
    },
    give(item, n = 1) { OTZI.inventory.add(item, n); },

var OTZI = window.OTZI || (window.OTZI = {});

OTZI.game = {
  running: false,
  scene: "field",
  seed: OTZI.CFG.defaultSeed,
  fps: 0,
  debug: false,
  minimap: false,
  menuOpen: false,
  setSeed(seed) {
    this.seed = seed || OTZI.CFG.defaultSeed;
    this.map = OTZI.worldgen.generate(this.seed);
    this.player = OTZI.entities.makePlayer();
    this.entities = OTZI.entities.spawnWorld(this.seed);
    this.resourceNodes = OTZI.resources.createFromMap(this.seed, this.map);
    this.inventory = OTZI.inventory.create();
    this.village = OTZI.village.create();
    this.facts = OTZI.facts.create();
    this.scene = "field";
  },
  update(dt, actions) {
    if (actions.debugPressed) OTZI.debug.toggle();
    if (actions.mapPressed) {
      this.minimap = !this.minimap;
      OTZI.dialogue.toast(this.minimap ? "Trail map open" : "Trail map closed");
    }
    if (actions.menuPressed) {
      this.menuOpen = !this.menuOpen;
      OTZI.input.clearAll();
      if (this.menuOpen) this.minimap = false;
      OTZI.dialogue.toast(this.menuOpen ? "Craft/Menu opened" : "Craft/Menu closed");
    }
    if (actions.usePressed) {
      this.tryGather();
    }
    if (actions.sprintPressed) {
      this.player.stamina = Math.max(0, this.player.stamina - 8);
      OTZI.dialogue.toast("Dodge/Sprint burst");
      OTZI.audio.blip(330, 0.035);
    }
    if (this.menuOpen) {
      actions.moveX = 0;
      actions.moveY = 0;
      actions.sprint = false;
    }
    const speed = actions.sprint ? OTZI.CFG.sprintSpeed : OTZI.CFG.playerSpeed;
    OTZI.collision.moveCircle(this.player, actions.moveX * speed * dt, actions.moveY * speed * dt);
    this.player.stamina = Math.max(0, Math.min(100, this.player.stamina + (actions.sprint ? -22 : 12) * dt));
    OTZI.entities.update(dt);
    OTZI.camera.update();
  },
  findNearestResource() {
    return OTZI.resources.findNearest(this.resourceNodes, this.player);
  },
  tryGather() {
    const found = this.findNearestResource();
    const node = found ? OTZI.resources.getById(this.resourceNodes, found.id) : null;
    if (!node) {
      OTZI.dialogue.toast("No resource nearby");
      OTZI.audio.blip(220, 0.035);
      return false;
    }
    OTZI.inventory.add(node.resource, node.amount);
    OTZI.resources.deplete(node, this.map);
    OTZI.dialogue.toast(`Gathered ${node.resource} +1`);
    OTZI.audio.blip(660, 0.04);
    return true;
  }
};

(function boot() {
  let accumulator = 0;
  let lastT = 0;
  let fpsTime = 0;
  let fpsFrames = 0;

  function frame(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(0.1, (t - lastT) / 1000);
    lastT = t;
    accumulator += dt;
    let steps = 0;
    while (accumulator >= OTZI.CFG.fixedDt && steps < OTZI.CFG.maxStepsPerFrame) {
      OTZI.game.update(OTZI.CFG.fixedDt, OTZI.actionMap.sample());
      accumulator -= OTZI.CFG.fixedDt;
      steps++;
    }
    if (steps === OTZI.CFG.maxStepsPerFrame) accumulator = 0;
    OTZI.renderWorld.draw();
    OTZI.renderUi.sync();
    fpsTime += dt;
    fpsFrames++;
    if (fpsTime >= 0.5) {
      OTZI.game.fps = fpsFrames / fpsTime;
      fpsTime = 0;
      fpsFrames = 0;
    }
    requestAnimationFrame(frame);
  }

  function init() {
    OTZI.dom.init();
    OTZI.assets.init();
    OTZI.viewport.init();
    OTZI.game.setSeed(OTZI.CFG.defaultSeed);
    OTZI.input.init();
    OTZI.save.load();
    OTZI.installTestHooks();

    OTZI.dom.startBtn.addEventListener("click", async () => {
      await OTZI.audio.unlock();
      OTZI.dom.startPanel.hidden = true;
      OTZI.game.running = true;
    });
    OTZI.dom.menuCloseBtn.addEventListener("click", () => {
      OTZI.game.menuOpen = false;
      OTZI.input.clearAll();
      OTZI.dialogue.toast("Craft/Menu closed");
    });

    OTZI.game.running = true;
    requestAnimationFrame(frame);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
