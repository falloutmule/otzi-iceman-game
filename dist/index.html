  <script>
/* AI-SAFE SINGLE-FILE CONSTITUTION
   Named section edits only in src modules.
   INPUT -> ACTIONS -> SIMULATION -> RENDER one-way flow.
   Render must not mutate gameplay state.
   No runtime external dependencies.
   SAVE_VERSION changes require migration.
   Test harness is exposed only as window.__OTZI_TEST__.
*/

/* MODULE: config.js */
/* SECTION 01: CONFIG */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.CFG = {
  engineVersion: "otzi-screen-grid-0.2.0",
  saveVersion: 4,
  worldgenVersion: 2,
  saveKey: "otzi_screen_grid_save_v3",
  defaultSeed: "otzi-m1",
  tileSize: 24,
  screenTileW: 24,
  screenTileH: 18,
  overworldGridW: 8,
  overworldGridH: 8,
  dungeonGridW: 3,
  dungeonGridH: 2,
  fixedDt: 1 / 60,
  maxStepsPerFrame: 5,
  playerSpeed: 118,
  sprintSpeed: 166,
  gatherRadius: 24,
  interactRadius: 26,
  resourceNodeRadius: 10,
  transitionEdgePad: 18,
  screenTransitionDuration: 0.18,
  dprCap: 2
};


/* MODULE: dom.js */
/* SECTION 00: DOM */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.dom = {
  init() {
    this.app = document.getElementById("app");
    this.canvas = document.getElementById("worldCanvas");
    this.uiRoot = document.getElementById("uiRoot");
    this.ctx = this.canvas.getContext("2d", { alpha: false });
    this.uiRoot.innerHTML = `
      <section id="gameShell" class="game-shell" aria-label="Game viewport">
        <div id="minimapPanel" class="minimap-panel" hidden aria-label="Trail map preview">
          <div class="panel-title" id="minimapTitle">TRAIL MAP</div>
          <canvas id="minimapCanvas" width="120" height="120" aria-hidden="true"></canvas>
        </div>
        <div id="inventoryPanel" class="inventory-panel" hidden aria-label="Pack inventory">
          <div class="panel-title">PACK</div>
          <dl>
            <div><dt>Flint</dt><dd id="invFlint">0</dd></div>
            <div><dt>Sticks</dt><dd id="invStick">0</dd></div>
            <div><dt>Stones</dt><dd id="invStone">0</dd></div>
            <div><dt>Bark</dt><dd id="invBark">0</dd></div>
            <div><dt>Grass</dt><dd id="invGrass">0</dd></div>
            <div><dt>Food</dt><dd id="invFood">0</dd></div>
            <div><dt>Crude tools</dt><dd id="invCrudeTool">0</dd></div>
          </dl>
        </div>
        <div class="start-panel" id="startPanel">
          <h1>The Legend of &Ouml;tzi the Iceman</h1>
          <p>Canvas 2D survival adventure engine shell.</p>
          <button id="startBtn" type="button">Start / Audio Unlock</button>
        </div>
      </section>
      <section id="popupBar" class="popup-bar" aria-label="Map and inventory buttons">
        <button id="mapTab" type="button" aria-label="Trail map">MAP</button>
        <button id="inventoryBtn" type="button" aria-label="Open inventory">PACK</button>
      </section>
      <section class="controls" id="controls" aria-label="Touch controls">
        <div class="stick-zone" id="moveZone" aria-label="MOVE joystick">
          <div class="stick-label">MOVE</div>
          <div class="stick-base"><div class="stick-knob" id="stickKnob"></div></div>
        </div>
        <div class="action-cluster">
          <button id="useBtn" type="button">USE<br>GATHER</button>
          <button id="sprintBtn" type="button">DODGE<br>SPRINT</button>
          <button id="menuBtn" type="button">CRAFT<br>MENU</button>
        </div>
      </section>
      <section id="statsStrip" class="stats-strip" aria-label="Stats and status">
        <div id="healthChip" class="stat-chip">HP 100</div>
        <div id="staminaChip" class="stat-chip">STAM 100</div>
        <div id="hungerChip" class="stat-chip">HUNGER 0</div>
        <div id="warmthChip" class="stat-chip">WARMTH 100</div>
        <div id="statusLine" class="status-line">Milestone 1 engine shell</div>
        <button id="debugBtn" type="button" aria-label="Toggle debug">D</button>
      </section>
      <div id="debugPanel" class="debug-panel" hidden></div>
      <div id="menuPanel" class="menu-panel" hidden role="dialog" aria-modal="false" aria-label="Craft and menu placeholder">
        <div class="panel-title">CRAFT / MENU</div>
        <p>Craft/Menu placeholder &mdash; control path works.</p>
        <dl>
          <div><dt>Seed</dt><dd id="menuSeed">-</dd></div>
          <div><dt>Flint</dt><dd id="menuFlint">0</dd></div>
          <div><dt>Sticks</dt><dd id="menuStick">0</dd></div>
          <div><dt>Stones</dt><dd id="menuStone">0</dd></div>
          <div><dt>Bark</dt><dd id="menuBark">0</dd></div>
          <div><dt>Grass</dt><dd id="menuGrass">0</dd></div>
          <div><dt>Food</dt><dd id="menuFood">0</dd></div>
          <div><dt>Crude cutting tools</dt><dd id="menuCrudeTool">0</dd></div>
          <div><dt>Stamina</dt><dd id="menuStamina">100</dd></div>
        </dl>
        <button id="craftCrudeToolBtn" type="button">Craft Crude Cutting Tool</button>
        <button id="fullscreenBtn" type="button">Fullscreen</button>
        <button id="resetSaveBtn" type="button">Reset Save</button>
        <button id="menuCloseBtn" type="button">Close</button>
      </div>
    `;
    this.startPanel = document.getElementById("startPanel");
    this.startBtn = document.getElementById("startBtn");
    this.debugBtn = document.getElementById("debugBtn");
    this.debugPanel = document.getElementById("debugPanel");
    this.popupBar = document.getElementById("popupBar");
    this.statsStrip = document.getElementById("statsStrip");
    this.healthChip = document.getElementById("healthChip");
    this.staminaChip = document.getElementById("staminaChip");
    this.hungerChip = document.getElementById("hungerChip");
    this.warmthChip = document.getElementById("warmthChip");
    this.gameShell = document.getElementById("gameShell");
    this.gameShell.prepend(this.canvas);
    this.minimapPanel = document.getElementById("minimapPanel");
    this.minimapTitle = document.getElementById("minimapTitle");
    this.minimapCanvas = document.getElementById("minimapCanvas");
    this.minimapCtx = this.minimapCanvas.getContext("2d", { alpha: false });
    this.inventoryPanel = document.getElementById("inventoryPanel");
    this.invFlint = document.getElementById("invFlint");
    this.invStick = document.getElementById("invStick");
    this.invStone = document.getElementById("invStone");
    this.invBark = document.getElementById("invBark");
    this.invGrass = document.getElementById("invGrass");
    this.invFood = document.getElementById("invFood");
    this.invCrudeTool = document.getElementById("invCrudeTool");
    this.menuPanel = document.getElementById("menuPanel");
    this.menuSeed = document.getElementById("menuSeed");
    this.menuFlint = document.getElementById("menuFlint");
    this.menuStick = document.getElementById("menuStick");
    this.menuStone = document.getElementById("menuStone");
    this.menuBark = document.getElementById("menuBark");
    this.menuGrass = document.getElementById("menuGrass");
    this.menuFood = document.getElementById("menuFood");
    this.menuCrudeTool = document.getElementById("menuCrudeTool");
    this.menuStamina = document.getElementById("menuStamina");
    this.craftCrudeToolBtn = document.getElementById("craftCrudeToolBtn");
    this.fullscreenBtn = document.getElementById("fullscreenBtn");
    this.resetSaveBtn = document.getElementById("resetSaveBtn");
    this.menuCloseBtn = document.getElementById("menuCloseBtn");
    this.statusLine = document.getElementById("statusLine");
    this.moveZone = document.getElementById("moveZone");
    this.stickKnob = document.getElementById("stickKnob");
    this.useBtn = document.getElementById("useBtn");
    this.sprintBtn = document.getElementById("sprintBtn");
    this.menuBtn = document.getElementById("menuBtn");
    this.mapTab = document.getElementById("mapTab");
    this.inventoryBtn = document.getElementById("inventoryBtn");
  }
};


/* MODULE: rng.js */
/* SECTION 02: RNG */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.rng = {
  hashSeed(seed) {
    let h = 2166136261;
    const s = String(seed || "seed");
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  },
  make(seed) {
    let state = this.hashSeed(seed) || 1;
    return {
      next() {
        state |= 0;
        state = (state + 0x6d2b79f5) | 0;
        let t = Math.imul(state ^ (state >>> 15), 1 | state);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      },
      range(min, max) {
        return min + this.next() * (max - min);
      },
      int(min, max) {
        return Math.floor(this.range(min, max + 1));
      }
    };
  }
};


/* MODULE: viewport.js */
/* SECTION 03: VIEWPORT */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.viewport = {
  cssW: 0,
  cssH: 0,
  dpr: 1,
  internalW: 0,
  internalH: 0,
  init() {
    const resize = () => this.resize();
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 80));
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resize);
      window.visualViewport.addEventListener("scroll", resize);
    }
    this.resize();
  },
  resize() {
    const canvas = OTZI.dom.canvas;
    const rect = canvas.getBoundingClientRect();
    this.cssW = Math.max(1, Math.floor(rect.width));
    this.cssH = Math.max(1, Math.floor(rect.height));
    this.dpr = Math.min(OTZI.CFG.dprCap, window.devicePixelRatio || 1);
    this.internalW = Math.max(1, Math.floor(this.cssW * this.dpr));
    this.internalH = Math.max(1, Math.floor(this.cssH * this.dpr));
    if (canvas.width !== this.internalW || canvas.height !== this.internalH) {
      canvas.width = this.internalW;
      canvas.height = this.internalH;
    }
    const ctx = OTZI.dom.ctx;
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
};


/* MODULE: input.js */
/* SECTION 04A: INPUT */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.input = {
  keys: new Set(),
  pointers: new Map(),
  moveVector: { x: 0, y: 0 },
  pressed: { use: false, sprint: false, menu: false, debug: false, map: false, inventory: false },
  sprintHeld: false,
  init() {
    window.addEventListener("keydown", (ev) => {
      this.keys.add(ev.code);
      if (ev.code === "KeyD") this.pressed.debug = true;
      if (ev.code === "KeyE" || ev.code === "Space") this.pressed.use = true;
      if (ev.code === "KeyM") this.pressed.map = true;
      if (ev.code === "KeyI") this.pressed.inventory = true;
      if (ev.code === "Escape" && OTZI.game.menuOpen) {
        OTZI.game.menuOpen = false;
        this.clearAll();
        OTZI.dialogue.toast("Craft/Menu closed");
      }
      if (ev.code === "KeyR") OTZI.game.setSeed("otzi-" + Date.now().toString(36));
    });
    window.addEventListener("keyup", (ev) => this.keys.delete(ev.code));
    window.addEventListener("blur", () => this.clearAll());
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) this.clearAll();
    });
    window.addEventListener("orientationchange", () => this.clearAll());
    this.bindMoveZone();
    this.bindButton(OTZI.dom.useBtn, "use");
    this.bindButton(OTZI.dom.sprintBtn, "sprint");
    this.bindButton(OTZI.dom.menuBtn, "menu");
    this.bindButton(OTZI.dom.debugBtn, "debug");
    this.bindButton(OTZI.dom.mapTab, "map");
    this.bindButton(OTZI.dom.inventoryBtn, "inventory");
  },
  bindButton(el, name) {
    el.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      el.setPointerCapture?.(ev.pointerId);
      this.pressed[name] = true;
      if (name === "sprint") this.sprintHeld = true;
    });
    const clear = (ev) => {
      ev.preventDefault();
      el.releasePointerCapture?.(ev.pointerId);
      if (name === "sprint") this.sprintHeld = false;
    };
    el.addEventListener("pointerup", clear);
    el.addEventListener("pointercancel", clear);
    el.addEventListener("lostpointercapture", clear);
  },
  bindMoveZone() {
    const zone = OTZI.dom.moveZone;
    const update = (ev) => {
      const rect = zone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = ev.clientX - cx;
      const dy = ev.clientY - cy;
      const mag = Math.hypot(dx, dy);
      const max = Math.max(24, Math.min(rect.width, rect.height) * 0.32);
      const scale = mag > max ? max / mag : 1;
      this.moveVector.x = Math.max(-1, Math.min(1, dx / max));
      this.moveVector.y = Math.max(-1, Math.min(1, dy / max));
      OTZI.dom.stickKnob.style.transform = `translate(${dx * scale}px, ${dy * scale}px)`;
    };
    const clear = () => {
      this.moveVector.x = 0;
      this.moveVector.y = 0;
      OTZI.dom.stickKnob.style.transform = "translate(0, 0)";
    };
    zone.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      zone.setPointerCapture?.(ev.pointerId);
      this.pointers.set(ev.pointerId, "move");
      update(ev);
    });
    zone.addEventListener("pointermove", (ev) => {
      if (this.pointers.get(ev.pointerId) === "move") update(ev);
    });
    for (const type of ["pointerup", "pointercancel", "lostpointercapture"]) {
      zone.addEventListener(type, (ev) => {
        this.pointers.delete(ev.pointerId);
        clear();
      });
    }
  },
  consumePressed() {
    const out = { ...this.pressed };
    this.pressed.use = false;
    this.pressed.sprint = false;
    this.pressed.menu = false;
    this.pressed.debug = false;
    this.pressed.map = false;
    this.pressed.inventory = false;
    return out;
  },
  clearAll() {
    this.pointers.clear();
    this.moveVector.x = 0;
    this.moveVector.y = 0;
    this.sprintHeld = false;
    for (const key of Object.keys(this.pressed)) this.pressed[key] = false;
    OTZI.dom.stickKnob.style.transform = "translate(0, 0)";
  }
};


/* MODULE: action-map.js */
/* SECTION 04B: ACTION MAP */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.actionMap = {
  sample() {
    const input = OTZI.input;
    let x = input.moveVector.x;
    let y = input.moveVector.y;
    if (input.keys.has("ArrowLeft") || input.keys.has("KeyA")) x -= 1;
    if (input.keys.has("ArrowRight") || input.keys.has("KeyD")) x += 1;
    if (input.keys.has("ArrowUp") || input.keys.has("KeyW")) y -= 1;
    if (input.keys.has("ArrowDown") || input.keys.has("KeyS")) y += 1;
    const mag = Math.hypot(x, y);
    if (mag > 1) {
      x /= mag;
      y /= mag;
    }
    const pressed = input.consumePressed();
    return {
      moveX: x,
      moveY: y,
      sprint: input.sprintHeld || input.keys.has("ShiftLeft") || input.keys.has("ShiftRight"),
      sprintPressed: pressed.sprint,
      usePressed: pressed.use,
      menuPressed: pressed.menu,
      debugPressed: pressed.debug,
      mapPressed: pressed.map,
      inventoryPressed: pressed.inventory
    };
  }
};


/* MODULE: audio.js */
/* SECTION 05: AUDIO */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.audio = {
  ctx: null,
  unlocked: false,
  async unlock() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.ctx.state !== "running") await this.ctx.resume();
    this.unlocked = true;
    this.blip(440, 0.055);
  },
  blip(freq, seconds) {
    if (!this.ctx || !this.unlocked) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.045, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + seconds);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(now);
    osc.stop(now + seconds + 0.02);
  }
};

/* MODULE: tilemap.js */
/* SECTION 07A: TILEMAP */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.TILE = {
  GRASS: 0,
  DARK_GRASS: 1,
  PATH: 2,
  WATER: 3,
  SNOW: 4,
  TREE: 5,
  ROCK: 6,
  DEPLETED: 7,
  DEADWOOD: 8,
  STONE: 9,
  BIRCH: 10,
  GRASS_CLUMP: 11,
  BERRY: 12
};
OTZI.FLAG = { BLOCKED: 1, HARVEST: 2, VILLAGE: 4 };

OTZI.tilemap = {
  create(w, h) {
    return {
      w,
      h,
      ground: new Uint8Array(w * h),
      flags: new Uint8Array(w * h),
      idx(x, y) { return y * this.w + x; },
      inside(x, y) { return x >= 0 && y >= 0 && x < this.w && y < this.h; },
      getGround(x, y) { return this.inside(x, y) ? this.ground[this.idx(x, y)] : OTZI.TILE.WATER; },
      setGround(x, y, v) { if (this.inside(x, y)) this.ground[this.idx(x, y)] = v; },
      getFlags(x, y) { return this.inside(x, y) ? this.flags[this.idx(x, y)] : OTZI.FLAG.BLOCKED; },
      setFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] = v; },
      addFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] |= v; },
      clearFlags(x, y, v) { if (this.inside(x, y)) this.flags[this.idx(x, y)] &= ~v; }
    };
  }
};


/* MODULE: world-grid.js */
/* SECTION 07C: WORLD GRID */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.worldGrid = {
  createOverworld(seed) {
    const cfg = OTZI.CFG;
    const homeX = Math.floor(cfg.overworldGridW / 2);
    const homeY = Math.floor(cfg.overworldGridH / 2);
    return {
      id: "overworld",
      seed,
      gridW: cfg.overworldGridW,
      gridH: cfg.overworldGridH,
      homeX,
      homeY,
      flintScarX: Math.min(cfg.overworldGridW - 2, homeX + 1),
      flintScarY: homeY,
      currentX: homeX,
      currentY: homeY,
      discovered: {},
      screens: {}
    };
  },
  createDungeon(seed, id) {
    return {
      id,
      seed,
      gridW: OTZI.CFG.dungeonGridW,
      gridH: OTZI.CFG.dungeonGridH,
      currentX: 0,
      currentY: 1,
      discovered: {},
      rooms: {}
    };
  },
  key(x, y) {
    return `${x},${y}`;
  },
  isDiscovered(grid, x, y) {
    return !!grid.discovered[this.key(x, y)];
  },
  markDiscovered(grid, x, y) {
    grid.discovered[this.key(x, y)] = true;
  },
  getOverworldScreen(world, seed, x, y) {
    const key = this.key(x, y);
    if (!world.screens[key]) world.screens[key] = OTZI.worldgen.generateOverworldScreen(seed, x, y, world);
    return world.screens[key];
  },
  getDungeonRoom(dungeon, seed, x, y) {
    const key = this.key(x, y);
    if (!dungeon.rooms[key]) dungeon.rooms[key] = OTZI.worldgen.generateDungeonRoom(seed, dungeon.id, x, y, dungeon);
    return dungeon.rooms[key];
  },
  collectAreaStates(areas) {
    return Object.values(areas).map((area) => ({
      id: area.id,
      gridX: area.gridX,
      gridY: area.gridY,
      completed: !!area.completed,
      depleted: OTZI.resources.depletedDeltas(area.resources)
    }));
  },
  applyAreaState(grid, seed, state) {
    const area = grid.id === "overworld" ?
      this.getOverworldScreen(grid, seed, state.gridX, state.gridY) :
      this.getDungeonRoom(grid, seed, state.gridX, state.gridY);
    area.completed = !!state.completed;
    OTZI.resources.applyDepletedDeltas(area.resources, area.map, state.depleted || []);
    return area;
  },
  findScreenWithResource(world, seed, resource) {
    for (let y = 0; y < world.gridH; y++) {
      for (let x = 0; x < world.gridW; x++) {
        const screen = this.getOverworldScreen(world, seed, x, y);
        if (screen.resources.some((node) => !node.depleted && node.resource === resource)) return screen;
      }
    }
    return null;
  }
};


/* MODULE: worldgen.js */
/* SECTION 07B: WORLDGEN */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.worldgen = {
  generateOverworldScreen(seed, x, y, world) {
    const cfg = OTZI.CFG;
    const map = OTZI.tilemap.create(cfg.screenTileW, cfg.screenTileH);
    const rng = OTZI.rng.make(`${seed}:overworld:${x},${y}:v${cfg.worldgenVersion}`);
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    const exits = { n: y > 0, s: y < world.gridH - 1, e: x < world.gridW - 1, w: x > 0 };
    const kind = this.overworldKind(world, x, y);

    for (let ty = 0; ty < map.h; ty++) {
      for (let tx = 0; tx < map.w; tx++) {
        const latitude = y / Math.max(1, world.gridH - 1);
        let ground = latitude < 0.3 && rng.next() < 0.2 ? OTZI.TILE.SNOW : OTZI.TILE.GRASS;
        if (rng.next() < 0.18) ground = OTZI.TILE.DARK_GRASS;
        map.setGround(tx, ty, ground);
      }
    }

    this.carveExitPaths(map, exits);
    this.placeObstacles(map, rng, kind);
    if (kind === "village_crossroads") this.placeVillageCenter(map, exits);
    if (kind === "flint_scar") this.placeFlintScarGround(map);
    this.placeOverworldResources(map, rng, kind, x, y, world.homeX, world.homeY);

    const area = {
      id: `overworld_${x}_${y}`,
      kind,
      biome: kind === "village_crossroads" ? "village" : kind === "flint_scar" ? "scar" : "forest",
      gridX: x,
      gridY: y,
      exits,
      discovered: false,
      completed: false,
      map,
      resources: [],
      animals: [],
      hazards: [],
      entrances: []
    };
    if (kind === "flint_scar") {
      area.entrances.push({
        id: `${area.id}_flint_scar_entry`,
        kind: "entrance",
        label: "Flint Scar",
        targetScene: "dungeon",
        dungeonId: "flint_scar",
        x: (map.w - 4.5) * cfg.tileSize,
        y: (cy + 0.5) * cfg.tileSize,
        tileX: map.w - 5,
        tileY: cy,
        radius: cfg.interactRadius
      });
    }
    area.resources = OTZI.resources.createFromMap(area.id, map);
    area.entities = OTZI.entities.spawnScreen(seed, area.id, map, kind);
    return area;
  },
  generateDungeonRoom(seed, id, x, y, dungeon) {
    const cfg = OTZI.CFG;
    const map = OTZI.tilemap.create(cfg.screenTileW, cfg.screenTileH);
    const rng = OTZI.rng.make(`${seed}:dungeon:${id}:${x},${y}:v${cfg.worldgenVersion}`);
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    for (let ty = 0; ty < map.h; ty++) {
      for (let tx = 0; tx < map.w; tx++) {
        map.setGround(tx, ty, OTZI.TILE.DARK_GRASS);
      }
    }
    for (let tx = 2; tx < map.w - 2; tx++) map.setGround(tx, cy, OTZI.TILE.PATH);
    for (let ty = 2; ty < map.h - 2; ty++) map.setGround(cx, ty, OTZI.TILE.PATH);
    for (let i = 0; i < 40; i++) {
      const tx = rng.int(2, map.w - 3);
      const ty = rng.int(2, map.h - 3);
      if (Math.abs(tx - cx) < 3 && Math.abs(ty - cy) < 3) continue;
      map.setGround(tx, ty, OTZI.TILE.STONE);
      map.addFlags(tx, ty, OTZI.FLAG.BLOCKED);
    }
    if (x === 0 && y === 1) {
      for (const tx of [cx - 3, cx + 2]) {
        map.setGround(tx, cy - 2, OTZI.TILE.ROCK);
        map.addFlags(tx, cy - 2, OTZI.FLAG.HARVEST | OTZI.FLAG.BLOCKED);
      }
    }
    const area = {
      id: `dungeon_${id}_${x}_${y}`,
      kind: "dungeon_room",
      biome: "cave",
      gridX: x,
      gridY: y,
      exits: { n: false, s: false, e: false, w: false },
      discovered: false,
      completed: false,
      map,
      resources: [],
      animals: [],
      hazards: [],
      entrances: []
    };
    if (x === 0 && y === 1) {
      area.entrances.push({
        id: `${area.id}_exit`,
        kind: "exit",
        label: "Forest Exit",
        targetScene: "overworld",
        x: (2.5) * cfg.tileSize,
        y: (cy + 0.5) * cfg.tileSize,
        tileX: 2,
        tileY: cy,
        radius: cfg.interactRadius
      });
    }
    area.resources = OTZI.resources.createFromMap(area.id, map);
    area.entities = [];
    return area;
  },
  overworldKind(world, x, y) {
    if (x === world.homeX && y === world.homeY) return "village_crossroads";
    if (x === world.flintScarX && y === world.flintScarY) return "flint_scar";
    return (x + y) % 3 === 0 ? "trail_forest" : "forest";
  },
  carveExitPaths(map, exits) {
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    map.setGround(cx, cy, OTZI.TILE.PATH);
    if (exits.n) for (let ty = 0; ty <= cy; ty++) map.setGround(cx, ty, OTZI.TILE.PATH);
    if (exits.s) for (let ty = cy; ty < map.h; ty++) map.setGround(cx, ty, OTZI.TILE.PATH);
    if (exits.w) for (let tx = 0; tx <= cx; tx++) map.setGround(tx, cy, OTZI.TILE.PATH);
    if (exits.e) for (let tx = cx; tx < map.w; tx++) map.setGround(tx, cy, OTZI.TILE.PATH);
  },
  placeVillageCenter(map) {
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    for (let ty = cy - 2; ty <= cy + 2; ty++) {
      for (let tx = cx - 2; tx <= cx + 2; tx++) {
        map.setGround(tx, ty, OTZI.TILE.PATH);
        map.setFlags(tx, ty, OTZI.FLAG.VILLAGE);
      }
    }
  },
  placeFlintScarGround(map) {
    const scarX = map.w - 5;
    const scarY = Math.floor(map.h / 2);
    for (let tx = scarX - 1; tx <= scarX + 1; tx++) {
      for (let ty = scarY - 1; ty <= scarY + 1; ty++) {
        map.setGround(tx, ty, OTZI.TILE.STONE);
      }
    }
  },
  placeObstacles(map, rng, kind) {
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    const count = kind === "village_crossroads" ? 18 : 32;
    for (let i = 0; i < count; i++) {
      const tx = rng.int(1, map.w - 2);
      const ty = rng.int(1, map.h - 2);
      if (Math.abs(tx - cx) < 2 || Math.abs(ty - cy) < 2) continue;
      if (map.getGround(tx, ty) === OTZI.TILE.PATH) continue;
      map.setGround(tx, ty, rng.next() < 0.7 ? OTZI.TILE.TREE : OTZI.TILE.ROCK);
      map.addFlags(tx, ty, OTZI.FLAG.BLOCKED);
    }
  },
  placeOverworldResources(map, rng, kind, gridX, gridY, homeX, homeY) {
    if (kind === "village_crossroads") return;
    const cx = Math.floor(map.w / 2);
    const cy = Math.floor(map.h / 2);
    const baseTiles = [OTZI.TILE.DEADWOOD, OTZI.TILE.STONE, OTZI.TILE.GRASS_CLUMP];
    if ((gridX + gridY) % 2 === 0 || kind === "flint_scar") baseTiles.push(OTZI.TILE.ROCK);
    if (gridX % 2 === 0) baseTiles.push(OTZI.TILE.BIRCH);
    if (gridY % 2 === 1) baseTiles.push(OTZI.TILE.BERRY);
    const count = kind === "flint_scar" ? 16 : 10;
    for (let i = 0; i < count; i++) {
      for (let attempt = 0; attempt < 30; attempt++) {
        const tx = rng.int(1, map.w - 2);
        const ty = rng.int(1, map.h - 2);
        if (Math.abs(tx - cx) < 3 && Math.abs(ty - cy) < 3) continue;
        if (gridX === homeX && gridY === homeY) continue;
        if (map.getGround(tx, ty) === OTZI.TILE.PATH) continue;
        if (map.getFlags(tx, ty) & OTZI.FLAG.BLOCKED) continue;
        const tile = baseTiles[rng.int(0, baseTiles.length)];
        map.setGround(tx, ty, tile);
        map.addFlags(tx, ty, OTZI.FLAG.HARVEST);
        if (tile !== OTZI.TILE.GRASS_CLUMP && tile !== OTZI.TILE.BERRY) map.addFlags(tx, ty, OTZI.FLAG.BLOCKED);
        break;
      }
    }
  }
};


/* MODULE: entities.js */
/* SECTION 08A: ENTITIES */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.entities = {
  makePlayer() {
    const cfg = OTZI.CFG;
    return {
      id: "player",
      kind: "player",
      x: cfg.screenTileW * cfg.tileSize / 2,
      y: cfg.screenTileH * cfg.tileSize / 2,
      radius: 8,
      health: 100,
      stamina: 100,
      hunger: 0,
      warmth: 100,
      wetness: 0
    };
  },
  spawnScreen(seed, areaId, map, kind) {
    const rng = OTZI.rng.make(`${seed}:entities:${areaId}`);
    const out = [];
    const count = kind === "village_crossroads" || kind === "flint_scar" || areaId.indexOf("dungeon") === 0 ? 0 : 2;
    for (let i = 0; i < count; i++) {
      let x = 0;
      let y = 0;
      for (let attempt = 0; attempt < 24; attempt++) {
        x = rng.range(3, map.w - 3) * OTZI.CFG.tileSize;
        y = rng.range(3, map.h - 3) * OTZI.CFG.tileSize;
        if (!(map.getFlags(Math.floor(x / OTZI.CFG.tileSize), Math.floor(y / OTZI.CFG.tileSize)) & OTZI.FLAG.BLOCKED)) break;
      }
      out.push({
        id: `${areaId}-deer-${i}`,
        kind: "deer",
        x,
        y,
        radius: 7,
        phase: rng.range(0, Math.PI * 2)
      });
    }
    return out;
  },
  update(dt) {
    const game = OTZI.game;
    for (const e of game.entities) {
      if (e.kind !== "deer") continue;
      e.phase += dt;
      const dx = Math.cos(e.phase * 0.7) * 8 * dt;
      const dy = Math.sin(e.phase * 0.9) * 8 * dt;
      const moved = OTZI.collision.moveCircle(e, dx, dy);
      e.x = moved.x;
      e.y = moved.y;
    }
  }
};


/* MODULE: resources.js */
/* SECTION 08B: RESOURCES */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.resources = {
  createFromMap(areaId, map) {
    const nodes = [];
    const ts = OTZI.CFG.tileSize;
    for (let y = 0; y < map.h; y++) {
      for (let x = 0; x < map.w; x++) {
        if (!(map.getFlags(x, y) & OTZI.FLAG.HARVEST)) continue;
        const resource = this.resourceForTile(map.getGround(x, y));
        if (!resource) continue;
        nodes.push({
          id: `node_${areaId}_${x}_${y}_${resource}`.replace(/[^a-zA-Z0-9_-]/g, "_"),
          kind: "resource",
          resource,
          x: (x + 0.5) * ts,
          y: (y + 0.5) * ts,
          tileX: x,
          tileY: y,
          radius: OTZI.CFG.resourceNodeRadius,
          amount: 1,
          depleted: false,
          respawn: "none",
          saveDeltaId: `${areaId}:${x},${y}:${resource}`,
          saveable: true
        });
      }
    }
    return nodes;
  },
  resourceForTile(tile) {
    if (tile === OTZI.TILE.ROCK) return "flint";
    if (tile === OTZI.TILE.DEADWOOD) return "stick";
    if (tile === OTZI.TILE.STONE) return "stone";
    if (tile === OTZI.TILE.BIRCH) return "bark";
    if (tile === OTZI.TILE.GRASS_CLUMP) return "grass";
    if (tile === OTZI.TILE.BERRY) return "food";
    return null;
  },
  findNearest(nodes, player, resourceType = null) {
    let best = null;
    for (const node of nodes) {
      if (node.depleted) continue;
      if (resourceType && node.resource !== resourceType) continue;
      const dist = Math.hypot(node.x - player.x, node.y - player.y);
      const range = Math.max(node.radius, OTZI.CFG.gatherRadius);
      if (dist <= range && (!best || dist < best.dist)) best = { ...node, dist };
    }
    return best;
  },
  findNearestVisibleTarget(nodes, player, map, resourceType = null) {
    let best = null;
    for (const node of nodes) {
      if (node.depleted) continue;
      if (resourceType && node.resource !== resourceType) continue;
      if (!node.resource) continue;
      if (!(map.getFlags(node.tileX, node.tileY) & OTZI.FLAG.HARVEST)) continue;
      const dist = Math.hypot(node.x - player.x, node.y - player.y);
      if (dist > OTZI.CFG.gatherRadius) continue;
      if (!best || dist < best.dist) best = { ...node, dist };
    }
    return best;
  },
  getById(nodes, id) {
    return nodes.find((node) => node.id === id) || null;
  },
  deplete(node, map) {
    node.depleted = true;
    node.amount = 0;
    map.setGround(node.tileX, node.tileY, OTZI.TILE.DEPLETED);
    map.clearFlags(node.tileX, node.tileY, OTZI.FLAG.HARVEST | OTZI.FLAG.BLOCKED);
  },
  depletedDeltas(nodes) {
    return nodes
      .filter((node) => node.saveable && node.depleted)
      .map((node) => node.saveDeltaId);
  },
  applyDepletedDeltas(nodes, map, deltas = []) {
    const wanted = new Set(deltas);
    for (const node of nodes) {
      if (!wanted.has(node.saveDeltaId)) continue;
      this.deplete(node, map);
    }
  },
  count(nodes) {
    return nodes.reduce((acc, node) => {
      const bucket = node.depleted ? "depleted" : "active";
      acc.total++;
      acc[bucket]++;
      acc.byResource[node.resource] = acc.byResource[node.resource] || { total: 0, active: 0, depleted: 0 };
      acc.byResource[node.resource].total++;
      acc.byResource[node.resource][bucket]++;
      return acc;
    }, { total: 0, active: 0, depleted: 0, byResource: {} });
  }
};



/* MODULE: survival.js */
/* SECTION 08C: SURVIVAL */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.survival = {
  clamp(v, min = 0, max = 100) {
    return Math.max(min, Math.min(max, v));
  },
  spendStamina(player, amount) {
    player.stamina = this.clamp(player.stamina - amount);
  },
  update(player, dt, sprinting) {
    player.health = this.clamp(player.health);
    player.stamina = this.clamp(player.stamina + (sprinting ? -22 : 14) * dt);
    player.hunger = this.clamp(player.hunger + 0.08 * dt);
    player.warmth = this.clamp(player.warmth + (player.wetness > 50 ? -0.5 : 0.08) * dt);
    player.wetness = this.clamp(player.wetness);
  },
  snapshot(player) {
    return {
      health: player.health,
      stamina: player.stamina,
      hunger: player.hunger,
      warmth: player.warmth,
      wetness: player.wetness
    };
  },
  apply(player, meters = {}) {
    player.health = this.clamp(meters.health ?? player.health);
    player.stamina = this.clamp(meters.stamina ?? player.stamina);
    player.hunger = this.clamp(meters.hunger ?? player.hunger);
    player.warmth = this.clamp(meters.warmth ?? player.warmth);
    player.wetness = this.clamp(meters.wetness ?? player.wetness);
  }
};



/* MODULE: fullscreen.js */

var OTZI = window.OTZI || (window.OTZI = {});

OTZI.fullscreen = {
  async toggle() {

      if (document.fullscreenElement) {
        await document.exitFullscreen();
        OTZI.dialogue.toast("Fullscreen off");
        return true;
      }
      const target = OTZI.dom.app || document.documentElement;
      if (!target.requestFullscreen) {
        OTZI.dialogue.toast("Fullscreen unavailable");
        return false;
      }
      await target.requestFullscreen();
      OTZI.dialogue.toast("Fullscreen on");
      return true;

      OTZI.dialogue.toast("Fullscreen unavailable");
      return false;
    }
  }
};



/* MODULE: collision.js */
/* SECTION 08B: COLLISION */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.collision = {
  blockedAtWorld(x, y) {
    const ts = OTZI.CFG.tileSize;
    const tx = Math.floor(x / ts);
    const ty = Math.floor(y / ts);
    return !!(OTZI.game.map.getFlags(tx, ty) & OTZI.FLAG.BLOCKED);
  },
  moveCircle(entity, dx, dy) {
    let nx = entity.x + dx;
    let ny = entity.y;
    if (!this.circleBlocked(nx, ny, entity.radius)) entity.x = nx;
    nx = entity.x;
    ny = entity.y + dy;
    if (!this.circleBlocked(nx, ny, entity.radius)) entity.y = ny;
    return { x: entity.x, y: entity.y };
  },
  circleBlocked(x, y, r) {
    return this.blockedAtWorld(x - r, y - r) ||
      this.blockedAtWorld(x + r, y - r) ||
      this.blockedAtWorld(x - r, y + r) ||
      this.blockedAtWorld(x + r, y + r);
  }
};


/* MODULE: camera.js */
/* SECTION 09A: CAMERA */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.camera = {
  x: 0,
  y: 0,
  targetFor(map, player) {
    const vp = OTZI.viewport;
    const worldW = (map?.w || OTZI.CFG.screenTileW) * OTZI.CFG.tileSize;
    const worldH = (map?.h || OTZI.CFG.screenTileH) * OTZI.CFG.tileSize;
    return {
      x: Math.floor(Math.max(0, Math.min(worldW - vp.cssW, player.x - vp.cssW / 2))),
      y: Math.floor(Math.max(0, Math.min(worldH - vp.cssH, player.y - vp.cssH * 0.42)))
    };
  },
  update() {
    const map = OTZI.game.map;
    const p = OTZI.game.player;
    const target = this.targetFor(map, p);
    this.x = target.x;
    this.y = target.y;
  },
  worldToScreen(x, y) {
    return { x: x - this.x, y: y - this.y };
  }
};

/* MODULE: crafting.js */
/* FUTURE MODULE: CRAFTING */
var OTZI = window.OTZI || (window.OTZI = {});
OTZI.crafting = {
  recipes: [
    {
      id: "crude_cutting_tool",
      name: "Crude Cutting Tool",
      inputs: { stick: 1, flint: 1, grass: 1 },
      output: { item: "crudeTool", count: 1 }
    }
  ],
  getRecipe(id) {
    return this.recipes.find((recipe) => recipe.id === id) || null;
  },
  canCraft(id, inventory = OTZI.game.inventory) {
    const recipe = this.getRecipe(id);
    if (!recipe) return false;
    return Object.entries(recipe.inputs).every(([item, count]) => (inventory[item] || 0) >= count);
  },
  craft(id) {
    const recipe = this.getRecipe(id);
    if (!recipe) {
      OTZI.dialogue.toast("Unknown recipe");
      return false;
    }
    if (!this.canCraft(id)) {
      OTZI.dialogue.toast("Missing resources");
      OTZI.audio.blip(220, 0.035);
      return false;
    }
    for (const [item, count] of Object.entries(recipe.inputs)) {
      OTZI.inventory.add(item, -count);
    }
    OTZI.inventory.add(recipe.output.item, recipe.output.count);
    OTZI.dialogue.toast(`Crafted ${recipe.name}`);
    OTZI.audio.blip(720, 0.045);
    return true;
  }
};

/* MODULE: render-world.js */
/* SECTION 09B: RENDER WORLD */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.renderWorld = {
  draw() {
    const ctx = OTZI.dom.ctx;
    const vp = OTZI.viewport;
    ctx.fillStyle = "#0b0e0d";
    ctx.fillRect(0, 0, vp.cssW, vp.cssH);
    const transition = OTZI.game.transition;
    if (transition.active) {
      this.drawScreenTransition(ctx, transition);
      return;
    }
    this.drawArea(ctx, {
      area: OTZI.game.currentArea,
      camera: { x: OTZI.camera.x, y: OTZI.camera.y },
      player: OTZI.game.player,
      focusId: OTZI.game.focusedTargetType === "resource" ? OTZI.game.focusedResourceId : null,
      entranceId: OTZI.game.focusedTargetType === "entrance" ? OTZI.game.focusedEntranceId : null,
      offsetX: 0,
      offsetY: 0,
      debug: OTZI.game.debug
    });
  },
  drawScreenTransition(ctx, transition) {
    const vp = OTZI.viewport;
    const p = Math.max(0, Math.min(1, transition.elapsed / transition.duration));
    let fromOffsetX = 0;
    let fromOffsetY = 0;
    let toOffsetX = 0;
    let toOffsetY = 0;
    if (transition.direction === "east") {
      fromOffsetX = -vp.cssW * p;
      toOffsetX = vp.cssW * (1 - p);
    } else if (transition.direction === "west") {
      fromOffsetX = vp.cssW * p;
      toOffsetX = -vp.cssW * (1 - p);
    } else if (transition.direction === "north") {
      fromOffsetY = vp.cssH * p;
      toOffsetY = -vp.cssH * (1 - p);
    } else if (transition.direction === "south") {
      fromOffsetY = -vp.cssH * p;
      toOffsetY = vp.cssH * (1 - p);
    }
    this.drawArea(ctx, {
      area: transition.fromArea,
      camera: transition.fromCamera,
      player: transition.fromPlayer,
      focusId: null,
      entranceId: null,
      offsetX: fromOffsetX,
      offsetY: fromOffsetY,
      debug: false
    });
    this.drawArea(ctx, {
      area: transition.toArea,
      camera: transition.toCamera,
      player: transition.toPlayer,
      focusId: null,
      entranceId: null,
      offsetX: toOffsetX,
      offsetY: toOffsetY,
      debug: false
    });
  },
  drawArea(ctx, state) {
    const area = state.area;
    const cam = state.camera;
    const cfg = OTZI.CFG;
    const pal = OTZI.assets.palette;
    const map = area.map;
    const startX = Math.max(0, Math.floor(cam.x / cfg.tileSize) - 1);
    const startY = Math.max(0, Math.floor(cam.y / cfg.tileSize) - 1);
    const endX = Math.min(map.w - 1, Math.ceil((cam.x + OTZI.viewport.cssW) / cfg.tileSize) + 1);
    const endY = Math.min(map.h - 1, Math.ceil((cam.y + OTZI.viewport.cssH) / cfg.tileSize) + 1);
    for (let y = startY; y <= endY; y++) {
      for (let x = startX; x <= endX; x++) {
        const t = map.getGround(x, y);
        ctx.fillStyle = t === OTZI.TILE.WATER ? pal.water :
          t === OTZI.TILE.SNOW ? pal.snow :
          t === OTZI.TILE.PATH ? pal.path :
          t === OTZI.TILE.TREE ? pal.tree :
          t === OTZI.TILE.ROCK ? pal.rock :
          t === OTZI.TILE.DEADWOOD ? "#6b4a2f" :
          t === OTZI.TILE.STONE ? "#545a55" :
          t === OTZI.TILE.BIRCH ? "#d8d3ba" :
          t === OTZI.TILE.GRASS_CLUMP ? "#6faa42" :
          t === OTZI.TILE.BERRY ? "#315b36" :
          t === OTZI.TILE.DEPLETED ? "#4d4b3d" :
          t === OTZI.TILE.DARK_GRASS ? pal.darkGrass : pal.grass;
        const dx = x * cfg.tileSize - cam.x + state.offsetX;
        const dy = y * cfg.tileSize - cam.y + state.offsetY;
        ctx.fillRect(dx, dy, cfg.tileSize, cfg.tileSize);
        if (t === OTZI.TILE.TREE) {
          ctx.fillStyle = "#102516";
          ctx.fillRect(dx + 6, dy + 4, 12, 17);
        }
        if (t === OTZI.TILE.ROCK) {
          ctx.fillStyle = "#8b8d83";
          ctx.fillRect(dx + 5, dy + 7, 14, 10);
        }
        if (t === OTZI.TILE.DEADWOOD) {
          ctx.fillStyle = "#9b6b3e";
          ctx.fillRect(dx + 4, dy + 13, 16, 5);
        }
        if (t === OTZI.TILE.STONE) {
          ctx.fillStyle = "#a5aaa0";
          ctx.fillRect(dx + 7, dy + 9, 10, 8);
        }
        if (t === OTZI.TILE.BIRCH) {
          ctx.fillStyle = "#f1ead0";
          ctx.fillRect(dx + 9, dy + 4, 7, 18);
          ctx.fillStyle = "#332d24";
          ctx.fillRect(dx + 10, dy + 8, 5, 2);
        }
        if (t === OTZI.TILE.GRASS_CLUMP) {
          ctx.fillStyle = "#9bd35e";
          ctx.fillRect(dx + 5, dy + 13, 3, 7);
          ctx.fillRect(dx + 11, dy + 9, 3, 11);
          ctx.fillRect(dx + 17, dy + 12, 3, 8);
        }
        if (t === OTZI.TILE.BERRY) {
          ctx.fillStyle = "#233a20";
          ctx.fillRect(dx + 5, dy + 7, 14, 12);
          ctx.fillStyle = "#c43d4b";
          ctx.fillRect(dx + 9, dy + 9, 3, 3);
          ctx.fillRect(dx + 14, dy + 13, 3, 3);
        }
        if (t === OTZI.TILE.DEPLETED) {
          ctx.fillStyle = "rgba(0,0,0,.22)";
          ctx.fillRect(dx + 7, dy + 9, 10, 6);
        }
      }
    }
    for (const entrance of area.entrances || []) this.drawEntranceNode(ctx, entrance, state.entranceId === entrance.id, cam, state.offsetX, state.offsetY);
    for (const node of area.resources) this.drawResourceNode(ctx, node, state.focusId === node.id, cam, state.offsetX, state.offsetY);
    for (const e of area.entities || []) this.drawEntity(ctx, e, pal.deer, cam, state.offsetX, state.offsetY);
    this.drawEntity(ctx, state.player, pal.player, cam, state.offsetX, state.offsetY);
    if (state.debug) OTZI.debug.draw(ctx, startX, startY, endX, endY);
  },
  resourceColor(resource) {
    return {
      flint: "#d9e4d8",
      stick: "#c8894e",
      stone: "#b7bbb2",
      bark: "#f1ead0",
      grass: "#a8e36c",
      food: "#d94c5c"
    }[resource] || "#ffffff";
  },
  drawResourceNode(ctx, node, highlighted, camera, offsetX = 0, offsetY = 0) {
    if (node.depleted) return;
    const p = this.project(camera, node.x, node.y, offsetX, offsetY);
    if (p.x < -32 || p.y < -36 || p.x > OTZI.viewport.cssW + 32 || p.y > OTZI.viewport.cssH + 32) return;
    const x = Math.floor(p.x);
    const y = Math.floor(p.y);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.fillRect(x - 10, y + 10, 20, 4);
    this.drawResourceIcon(ctx, node.resource, x, y);
    if (highlighted) {
      this.drawResourceFocus(ctx, node.resource, x, y);
    }
    ctx.restore();
  },
  drawEntranceNode(ctx, entrance, highlighted, camera, offsetX = 0, offsetY = 0) {
    const p = this.project(camera, entrance.x, entrance.y, offsetX, offsetY);
    if (p.x < -32 || p.y < -36 || p.x > OTZI.viewport.cssW + 32 || p.y > OTZI.viewport.cssH + 32) return;
    const x = Math.floor(p.x);
    const y = Math.floor(p.y);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.4)";
    ctx.fillRect(x - 11, y + 11, 22, 4);
    ctx.fillStyle = "#2a2318";
    ctx.strokeStyle = "#d8ccb0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 10, y + 10);
    ctx.lineTo(x - 10, y - 2);
    ctx.quadraticCurveTo(x, y - 15, x + 10, y - 2);
    ctx.lineTo(x + 10, y + 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (highlighted) this.drawResourceFocus(ctx, entrance.label.toUpperCase(), x, y);
    ctx.restore();
  },
  drawResourceIcon(ctx, resource, x, y) {
    const color = this.resourceColor(resource);
    ctx.strokeStyle = "rgba(0,0,0,.78)";
    ctx.lineWidth = 2;
    ctx.fillStyle = color;
    if (resource === "flint") {
      ctx.beginPath();
      ctx.moveTo(x, y - 9);
      ctx.lineTo(x + 8, y);
      ctx.lineTo(x, y + 9);
      ctx.lineTo(x - 8, y);
      ctx.closePath();
      ctx.stroke();
      ctx.fill();
      return;
    }
    if (resource === "stick") {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-0.45);
      ctx.fillRect(-10, -4, 20, 8);
      ctx.strokeRect(-10, -4, 20, 8);
      ctx.restore();
      return;
    }
    if (resource === "bark") {
      ctx.fillRect(x - 8, y - 10, 16, 20);
      ctx.strokeRect(x - 8, y - 10, 16, 20);
      ctx.strokeStyle = "rgba(70,54,35,.8)";
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 8);
      ctx.lineTo(x - 3, y + 8);
      ctx.moveTo(x + 4, y - 7);
      ctx.lineTo(x + 4, y + 7);
      ctx.stroke();
      return;
    }
    if (resource === "grass") {
      ctx.beginPath();
      ctx.moveTo(x - 10, y + 8);
      ctx.lineTo(x - 6, y - 8);
      ctx.lineTo(x - 1, y + 8);
      ctx.lineTo(x + 3, y - 10);
      ctx.lineTo(x + 8, y + 8);
      ctx.closePath();
      ctx.stroke();
      ctx.fill();
      return;
    }
    if (resource === "food") {
      for (const [dx, dy] of [[-5, -3], [4, -4], [0, 5]]) {
        ctx.beginPath();
        ctx.arc(x + dx, y + dy, 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fill();
      }
      return;
    }
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fill();
  },
  drawResourceFocus(ctx, resource, x, y) {
    const label = resource.toUpperCase();
    ctx.strokeStyle = "#ffe08a";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.font = "800 10px ui-monospace,Consolas,monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const w = Math.max(44, label.length * 8 + 10);
    ctx.fillStyle = "rgba(0,0,0,.78)";
    ctx.fillRect(Math.floor(x - w / 2), y - 34, w, 16);
    ctx.strokeStyle = "rgba(255,224,138,.45)";
    ctx.strokeRect(Math.floor(x - w / 2), y - 34, w, 16);
    ctx.fillStyle = "#ffe8a8";
    ctx.fillText(label, x, y - 21);
  },
  drawEntity(ctx, e, color, camera, offsetX = 0, offsetY = 0) {
    const p = this.project(camera, e.x, e.y, offsetX, offsetY);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.fillRect(p.x - e.radius, p.y + e.radius + 2, e.radius * 2, 3);
  },
  project(camera, x, y, offsetX, offsetY) {
    return {
      x: x - camera.x + offsetX,
      y: y - camera.y + offsetY
    };
  }
};

    OTZI.dom.debugPanel.textContent = [

    ].join(" | ");
  },
  drawMinimap() {
    const ctx = OTZI.dom.minimapCtx;
    const w = OTZI.dom.minimapCanvas.width;
    const h = OTZI.dom.minimapCanvas.height;
    ctx.fillStyle = "#07100c";
    ctx.fillRect(0, 0, w, h);
    const game = OTZI.game;
    if (game.scene === "dungeon" && game.currentDungeon) {
      OTZI.dom.minimapTitle.textContent = "FLINT SCAR MAP";
      const dungeon = game.currentDungeon;
      const cellW = Math.floor(w / dungeon.gridW);
      const cellH = Math.floor(h / dungeon.gridH);
      ctx.font = "700 9px ui-monospace,Consolas,monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (let y = 0; y < dungeon.gridH; y++) {
        for (let x = 0; x < dungeon.gridW; x++) {
          const discovered = OTZI.worldGrid.isDiscovered(dungeon, x, y);
          const room = discovered ? OTZI.worldGrid.getDungeonRoom(dungeon, game.seed, x, y) : null;
          ctx.fillStyle = discovered ? "#4d4b3d" : "#101611";
          ctx.fillRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
          ctx.strokeStyle = "rgba(243,234,215,.14)";
          ctx.strokeRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
          if (room && room.entrances.some((entry) => entry.kind === "exit")) {
            ctx.fillStyle = "#d9c79a";
            ctx.fillText("E", x * cellW + cellW / 2, y * cellH + cellH / 2);
          }
        }
      }
      ctx.fillStyle = "#f0c666";
      ctx.fillRect(dungeon.currentX * cellW + 4, dungeon.currentY * cellH + 4, cellW - 8, cellH - 8);
      ctx.fillStyle = "#09120d";
      ctx.fillText("@", dungeon.currentX * cellW + cellW / 2, dungeon.currentY * cellH + cellH / 2);
      return;
    }
    OTZI.dom.minimapTitle.textContent = "OVERWORLD MAP";
    const world = game.world;
    const cellW = Math.floor(w / world.gridW);
    const cellH = Math.floor(h / world.gridH);
    ctx.font = "700 8px ui-monospace,Consolas,monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (let y = 0; y < world.gridH; y++) {
      for (let x = 0; x < world.gridW; x++) {
        if (!OTZI.worldGrid.isDiscovered(world, x, y)) {
          ctx.fillStyle = "#0e140f";
          ctx.fillRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
          ctx.strokeStyle = "rgba(243,234,215,.08)";
          ctx.strokeRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
          ctx.fillStyle = "#516255";
          ctx.fillText("?", x * cellW + cellW / 2, y * cellH + cellH / 2);
          continue;
        }
        const screen = OTZI.worldGrid.getOverworldScreen(world, game.seed, x, y);
        ctx.fillStyle = screen.kind === "village_crossroads" ? "#9a784b" :
          screen.kind === "flint_scar" ? "#c9d0d4" : "#315b36";
        ctx.fillRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
        ctx.strokeStyle = "rgba(243,234,215,.14)";
        ctx.strokeRect(x * cellW + 1, y * cellH + 1, cellW - 2, cellH - 2);
        ctx.fillStyle = "#f6ead0";
        if (screen.kind === "village_crossroads") ctx.fillText("V", x * cellW + cellW / 2, y * cellH + cellH / 2);
        else if (screen.kind === "flint_scar") ctx.fillText("C", x * cellW + cellW / 2, y * cellH + cellH / 2);
        else if (screen.kind === "trail_forest") ctx.fillText(".", x * cellW + cellW / 2, y * cellH + cellH / 2);
      }
    }
    const markerX = game.transition.active && game.transition.targetX != null ? game.transition.targetX : world.currentX;
    const markerY = game.transition.active && game.transition.targetY != null ? game.transition.targetY : world.currentY;
    ctx.fillStyle = "#f0c666";
    ctx.fillRect(markerX * cellW + 4, markerY * cellH + 4, cellW - 8, cellH - 8);
    ctx.fillStyle = "#09120d";
    ctx.fillText("@", markerX * cellW + cellW / 2, markerY * cellH + cellH / 2);
  }
};

/* MODULE: save.js */
/* SECTION 10: SAVE */
var OTZI = window.OTZI || (window.OTZI = {});

OTZI.save = {
  snapshot() {
    const g = OTZI.game;
    return {
      version: OTZI.CFG.saveVersion,
      engineVersion: OTZI.CFG.engineVersion,
      seed: g.seed,
      scene: g.scene,
      player: { x: g.player.x, y: g.player.y },
      meters: OTZI.survival.snapshot(g.player),
      minimap: g.minimap,
      inventory: g.inventory,
      overworld: {
        currentX: g.world.currentX,
        currentY: g.world.currentY,
        discovered: Object.keys(g.world.discovered),
        screens: OTZI.worldGrid.collectAreaStates(g.world.screens)
      },
      dungeon: g.currentDungeon ? {
        id: g.currentDungeon.id,
        currentX: g.currentDungeon.currentX,
        currentY: g.currentDungeon.currentY,
        discovered: Object.keys(g.currentDungeon.discovered),
        rooms: OTZI.worldGrid.collectAreaStates(g.currentDungeon.rooms),
        returnScreen: g.returnScreen
      } : null,
      village: g.village,
      facts: g.facts
    };
  },
  apply(data) {
    if (!data || data.version !== OTZI.CFG.saveVersion) throw new Error("Unsupported save version");
    const g = OTZI.game;
    g.setSeed(data.seed || OTZI.CFG.defaultSeed);
    if (data.overworld?.discovered) {
      g.world.discovered = Object.fromEntries(data.overworld.discovered.map((key) => [key, true]));
    }
    for (const state of data.overworld?.screens || []) OTZI.worldGrid.applyAreaState(g.world, g.seed, state);
    if (data.dungeon?.id) {
      g.currentDungeon = OTZI.worldGrid.createDungeon(g.seed, data.dungeon.id);
      g.currentDungeon.discovered = Object.fromEntries((data.dungeon.discovered || []).map((key) => [key, true]));
      for (const state of data.dungeon.rooms || []) OTZI.worldGrid.applyAreaState(g.currentDungeon, g.seed, state);
      g.returnScreen = data.dungeon.returnScreen || null;
    }
    if (data.scene === "dungeon" && data.dungeon?.id) {
      g.enterDungeonRoom(data.dungeon.currentX, data.dungeon.currentY, { keepScene: true, restorePlayer: true });
    } else {
      g.enterOverworldScreen(data.overworld?.currentX ?? g.world.homeX, data.overworld?.currentY ?? g.world.homeY, { keepScene: true, restorePlayer: true });
    }
    g.player.x = data.player?.x || g.player.x;
    g.player.y = data.player?.y || g.player.y;
    OTZI.survival.apply(OTZI.game.player, data.meters);
    g.inventory = { ...g.inventory, ...(data.inventory || {}) };
    g.minimap = !!data.minimap;
    g.village = { ...g.village, ...(data.village || {}) };
    g.facts = { ...g.facts, ...(data.facts || {}) };
    g.updateFocusState();
  },
  save() {
    try {
      localStorage.setItem(OTZI.CFG.saveKey, JSON.stringify(this.snapshot()));
      return true;
    } catch (_) {
      return false;
    }
  },
  load() {
    try {
      const raw = localStorage.getItem(OTZI.CFG.saveKey);
      if (!raw) return false;
      this.apply(JSON.parse(raw));
      return true;
    } catch (_) {
      return false;
    }
  },
  clear() {
    try {
      localStorage.removeItem(OTZI.CFG.saveKey);
    } catch (_) {}
    OTZI.game.setSeed(OTZI.CFG.defaultSeed);
    OTZI.game.minimap = false;
    OTZI.game.inventoryOpen = false;
    OTZI.game.menuOpen = false;
    OTZI.game.resetConfirm = false;
    OTZI.input?.clearAll?.();
    OTZI.dialogue.toast("Save reset");
    return true;
  },
  exportString() {
    return btoa(unescape(encodeURIComponent(JSON.stringify(this.snapshot()))));
  },
  importString(str) {
    this.apply(JSON.parse(decodeURIComponent(escape(atob(str)))));
  }
};

        },

        },

          return node ? {
            id: node.id,
            kind: node.kind,
            x: node.x,
            y: node.y,
            tileX: node.tileX,
            tileY: node.tileY,
            resource: node.resource,
            amount: node.amount,

          } : null;
        })(),
        focusedResource: g.focusedResource ? {
          id: g.focusedResource.id,
          resource: g.focusedResource.resource,
          tileX: g.focusedResource.tileX,
          tileY: g.focusedResource.tileY,
          dist: g.focusedResource.dist
        } : null,
        focusedEntrance: g.focusedEntrance ? {

          label: g.focusedEntrance.label,

        } : null,

        },
        input: {

          sprintHeld: OTZI.input.sprintHeld
        }
      };
    },
    setSeed(seed) { OTZI.game.setSeed(seed); },
    stepFrames(n = 1) {
      for (let i = 0; i < n; i++) OTZI.game.update(OTZI.CFG.fixedDt, OTZI.actionMap.sample());
    },
    stepUntilTransitionSettles(maxFrames = 30) {
      for (let i = 0; i < maxFrames; i++) {
        if (!OTZI.game.transition.active) break;
        OTZI.game.update(OTZI.CFG.fixedDt, OTZI.actionMap.sample());
      }
      return this.snapshot();
    },
    teleportToVillage() {
      OTZI.game.enterOverworldScreen(OTZI.game.world.homeX, OTZI.game.world.homeY);
    },
    enterOverworldScreen(x, y) {
      OTZI.game.enterOverworldScreen(x, y);
      return this.snapshot();
    },
    placeAndStepEdge(direction, frames = 2) {
      const ts = OTZI.CFG.tileSize;
      const pad = OTZI.CFG.transitionEdgePad;
      const maxX = OTZI.game.map.w * ts - pad;
      const maxY = OTZI.game.map.h * ts - pad;
      if (direction === "e") OTZI.game.player.x = maxX;
      if (direction === "w") OTZI.game.player.x = pad;
      if (direction === "s") OTZI.game.player.y = maxY;
      if (direction === "n") OTZI.game.player.y = pad;
      this.stepFrames(frames);
      return this.snapshot();
    },
    teleportAwayFromResources() {
      this.teleportToVillage();
      return this.snapshot().focusedResource || this.snapshot().focusedEntrance;
    },
    teleportToNearestResource(resourceType = null) {
      if (resourceType) {
        const foundScreen = OTZI.worldGrid.findScreenWithResource(OTZI.game.world, OTZI.game.seed, resourceType);
        if (foundScreen) OTZI.game.enterOverworldScreen(foundScreen.gridX, foundScreen.gridY);
      }
      let best = null;
      const ts = OTZI.CFG.tileSize;
      const px = OTZI.game.player.x;
      const py = OTZI.game.player.y;
      for (const node of OTZI.game.resourceNodes) {
        if (node.depleted) continue;
        if (resourceType && node.resource !== resourceType) continue;
        const dist = Math.hypot(node.x - px, node.y - py);
        if (!best || dist < best.dist) best = { ...node, dist };
      }
      if (best) {
        OTZI.game.player.x = best.x - ts * 0.8;
        OTZI.game.player.y = best.y;
        OTZI.camera.update();
        OTZI.game.updateFocusState();
      }
      return best;
    },
    teleportToResource(id) {
      const node = OTZI.resources.getById(OTZI.game.resourceNodes, id);
      if (!node) return null;
      OTZI.game.player.x = node.x - OTZI.CFG.tileSize * 0.8;
      OTZI.game.player.y = node.y;
      OTZI.camera.update();
      OTZI.game.updateFocusState();
      return { ...node };
    },
    teleportToFlintScarEntrance() {
      OTZI.game.enterOverworldScreen(OTZI.game.world.flintScarX, OTZI.game.world.flintScarY);
      const entry = OTZI.game.entrances[0];
      if (!entry) return null;
      OTZI.game.player.x = entry.x - OTZI.CFG.tileSize * 0.8;
      OTZI.game.player.y = entry.y;
      OTZI.camera.update();
      OTZI.game.updateFocusState();
      return { ...entry };
    },
    placePlayerAtEdge(direction) {
      OTZI.game.placePlayerForEntry(direction, { x: OTZI.game.player.x, y: OTZI.game.player.y });
      OTZI.game.updateFocusState();
      return this.snapshot();
    },
    focusedResource() {
      return OTZI.game.focusedResource ? { ...OTZI.game.focusedResource } : null;
    },
    focusedEntrance() {
      return OTZI.game.focusedEntrance ? { ...OTZI.game.focusedEntrance } : null;
    },
    teleportToFocusedEntrance() {
      const entry = OTZI.game.focusedEntrance || OTZI.game.entrances[0];
      if (!entry) return null;
      OTZI.game.player.x = entry.x - OTZI.CFG.tileSize * 0.8;
      OTZI.game.player.y = entry.y;
      OTZI.camera.update();
      OTZI.game.updateFocusState();
      return { ...entry };
    },
    screenSignature(x = OTZI.game.world.currentX, y = OTZI.game.world.currentY) {
      const screen = OTZI.worldGrid.getOverworldScreen(OTZI.game.world, OTZI.game.seed, x, y);
      return {
        id: screen.id,
        kind: screen.kind,
        exits: { ...screen.exits },
        resources: screen.resources.filter((node) => !node.depleted).map((node) => `${node.resource}:${node.tileX},${node.tileY}`).sort(),
        tiles: Array.from(screen.map.ground).join(",")
      };
    },
    spawnResourceDistanceMin() {
      const spawnX = OTZI.game.player.x;
      const spawnY = OTZI.game.player.y;
      let best = Infinity;
      for (const node of OTZI.game.resourceNodes) {
        if (node.depleted) continue;
        best = Math.min(best, Math.hypot(node.x - spawnX, node.y - spawnY));
      }
      return best;
    },
    resourceNode(id) {
      const node = OTZI.resources.getById(OTZI.game.resourceNodes, id);
      return node ? { ...node } : null;
    },
    give(item, n = 1) { OTZI.inventory.add(item, n); },
    setMeters(meters) { OTZI.survival.apply(OTZI.game.player, meters); },
    completeDungeon(id = "flint_cave") {
      if (!OTZI.game.village.unlocked.includes(id)) OTZI.game.village.unlocked.push(id);
    },
    exportSave() { return OTZI.save.exportString(); },
    importSave(str) { OTZI.save.importString(str); },
    saveNow() { return OTZI.save.save(); },
    toggleDebug() { OTZI.debug.toggle(); }
  };
};

var OTZI = window.OTZI || (window.OTZI = {});

OTZI.game = {
  running: false,
  scene: "overworld",
  seed: OTZI.CFG.defaultSeed,
  fps: 0,
  debug: false,
  minimap: false,
  inventoryOpen: false,
  menuOpen: false,
  resetConfirm: false,
  focusedTargetType: null,
  focusedResourceId: null,
  focusedResource: null,
  focusedEntranceId: null,
  focusedEntrance: null,
  transition: {
    active: false,
    kind: "screen_slide",
    direction: null,
    fromScreenId: null,
    toScreenId: null,
    elapsed: 0,
    duration: OTZI.CFG.screenTransitionDuration,
    fromArea: null,
    toArea: null,
    fromPlayer: null,
    toPlayer: null,
    fromCamera: null,
    toCamera: null,
    targetX: null,
    targetY: null
  },
  currentArea: null,
  currentScreen: null,
  currentRoom: null,
  currentDungeon: null,
  returnScreen: null,
  setSeed(seed) {
    this.seed = seed || OTZI.CFG.defaultSeed;
    this.player = OTZI.entities.makePlayer();
    this.inventory = OTZI.inventory.create();
    this.village = OTZI.village.create();
    this.facts = OTZI.facts.create();
    this.world = OTZI.worldGrid.createOverworld(this.seed);
    this.currentDungeon = null;
    this.currentRoom = null;
    this.returnScreen = null;
    this.focusedTargetType = null;
    this.focusedResourceId = null;
    this.focusedResource = null;
    this.focusedEntranceId = null;
    this.focusedEntrance = null;
    this.transition = {
      active: false,
      kind: "screen_slide",
      direction: null,
      fromScreenId: null,
      toScreenId: null,
      elapsed: 0,
      duration: OTZI.CFG.screenTransitionDuration,
      fromArea: null,
      toArea: null,
      fromPlayer: null,
      toPlayer: null,
      fromCamera: null,
      toCamera: null,
      targetX: null,
      targetY: null
    };
    this.enterOverworldScreen(this.world.homeX, this.world.homeY, { keepScene: true });
  },
  setActiveArea(area) {
    this.currentArea = area;
    this.map = area.map;
    this.resourceNodes = area.resources;
    this.entities = area.entities;
    this.entrances = area.entrances || [];
  },
  clampAreaPosition(pos) {
    const ts = OTZI.CFG.tileSize;
    const min = ts * 1.25;
    const maxX = this.map.w * ts - min;
    const maxY = this.map.h * ts - min;
    return {
      x: Math.max(min, Math.min(maxX, pos.x)),
      y: Math.max(min, Math.min(maxY, pos.y))
    };
  },
  computeEntryPosition(map, edge, carry) {
    const ts = OTZI.CFG.tileSize;
    const min = Math.max(ts * 1.25, OTZI.CFG.transitionEdgePad + ts * 0.45);
    const maxX = map.w * ts - min;
    const maxY = map.h * ts - min;
    const center = { x: map.w * ts / 2, y: map.h * ts / 2 };
    const next = { x: center.x, y: center.y };
    if (edge === "w") {
      next.x = min;
      next.y = Math.max(min, Math.min(maxY, carry?.y ?? center.y));
    } else if (edge === "e") {
      next.x = maxX;
      next.y = Math.max(min, Math.min(maxY, carry?.y ?? center.y));
    } else if (edge === "n") {
      next.x = Math.max(min, Math.min(maxX, carry?.x ?? center.x));
      next.y = min;
    } else if (edge === "s") {
      next.x = Math.max(min, Math.min(maxX, carry?.x ?? center.x));
      next.y = maxY;
    }
    return next;
  },
  placePlayerForEntry(edge, carry) {
    const next = this.computeEntryPosition(this.map, edge, carry);
    this.player.x = next.x;
    this.player.y = next.y;
  },
  enterOverworldScreen(x, y, opts = {}) {
    const screen = OTZI.worldGrid.getOverworldScreen(this.world, this.seed, x, y);
    this.world.currentX = x;
    this.world.currentY = y;
    OTZI.worldGrid.markDiscovered(this.world, x, y);
    screen.discovered = true;
    this.currentScreen = screen;
    this.currentRoom = null;
    this.scene = "overworld";
    this.setActiveArea(screen);
    if (!opts.restorePlayer) this.placePlayerForEntry(opts.entrySide || null, opts.carry);
    if (!opts.keepScene) OTZI.scenes.goto("overworld");
    OTZI.input.clearAll();
    OTZI.camera.update();
    this.updateFocusState();
  },
  beginScreenTransition(direction, x, y, entrySide, carry) {
    const toArea = OTZI.worldGrid.getOverworldScreen(this.world, this.seed, x, y);
    OTZI.worldGrid.markDiscovered(this.world, x, y);
    toArea.discovered = true;
    const toPlayer = this.computeEntryPosition(toArea.map, entrySide, carry);
    const toCamera = OTZI.camera.targetFor(toArea.map, toPlayer);
    this.transition = {
      active: true,
      kind: "screen_slide",
      direction,
      fromScreenId: this.currentScreen.id,
      toScreenId: toArea.id,
      elapsed: 0,
      duration: OTZI.CFG.screenTransitionDuration,
      fromArea: this.currentScreen,
      toArea,
      fromPlayer: { x: this.player.x, y: this.player.y, radius: this.player.radius },
      toPlayer: { x: toPlayer.x, y: toPlayer.y, radius: this.player.radius },
      fromCamera: { x: OTZI.camera.x, y: OTZI.camera.y },
      toCamera,
      targetX: x,
      targetY: y
    };
    OTZI.input.clearAll();
    this.focusedTargetType = null;
    this.focusedResourceId = null;
    this.focusedResource = null;
    this.focusedEntranceId = null;
    this.focusedEntrance = null;
  },
  finishScreenTransition() {
    const t = this.transition;
    this.transition.active = false;
    this.enterOverworldScreen(t.targetX, t.targetY, { keepScene: true, restorePlayer: true });
    this.player.x = t.toPlayer.x;
    this.player.y = t.toPlayer.y;
    OTZI.camera.update();
    OTZI.input.clearAll();
    this.updateFocusState();
  },
  updateTransition(dt) {
    if (!this.transition.active) return;
    this.transition.elapsed = Math.min(this.transition.duration, this.transition.elapsed + dt);
    if (this.transition.elapsed >= this.transition.duration) this.finishScreenTransition();
  },
  ensureDungeon(id) {
    if (!this.currentDungeon || this.currentDungeon.id !== id) {
      this.currentDungeon = OTZI.worldGrid.createDungeon(this.seed, id);
    }
    return this.currentDungeon;
  },
  enterDungeon(id) {
    this.returnScreen = {
      x: this.world.currentX,
      y: this.world.currentY
    };
    this.ensureDungeon(id);
    this.enterDungeonRoom(0, 1);
    OTZI.dialogue.toast("Entered Flint Scar");
  },
  enterDungeonRoom(x, y, opts = {}) {
    const dungeon = this.currentDungeon || this.ensureDungeon("flint_scar");
    const room = OTZI.worldGrid.getDungeonRoom(dungeon, this.seed, x, y);
    dungeon.currentX = x;
    dungeon.currentY = y;
    OTZI.worldGrid.markDiscovered(dungeon, x, y);
    room.discovered = true;
    this.currentRoom = room;
    this.scene = "dungeon";
    this.setActiveArea(room);
    if (!opts.restorePlayer) this.placePlayerForEntry(opts.entrySide || "e", opts.carry);
    if (!opts.keepScene) OTZI.scenes.goto("dungeon");
    OTZI.input.clearAll();
    OTZI.camera.update();
    this.updateFocusState();
  },
  exitDungeon() {
    const ret = this.returnScreen || { x: this.world.flintScarX, y: this.world.flintScarY };
    this.enterOverworldScreen(ret.x, ret.y, { keepScene: false });
    const entry = this.entrances.find((item) => item.dungeonId === "flint_scar");
    if (entry) {
      this.player.x = entry.x - OTZI.CFG.tileSize * 1.4;
      this.player.y = entry.y;
    }
    OTZI.camera.update();
    this.updateFocusState();
    OTZI.dialogue.toast("Returned to forest");
  },
  findNearestResource() {
    return OTZI.resources.findNearestVisibleTarget(this.resourceNodes, this.player, this.map);
  },
  findNearestEntrance() {
    let best = null;
    for (const entrance of this.entrances || []) {
      const dist = Math.hypot(entrance.x - this.player.x, entrance.y - this.player.y);
      if (dist > OTZI.CFG.interactRadius) continue;
      if (!best || dist < best.dist) best = { ...entrance, dist };
    }
    return best;
  },
  updateFocusState() {
    const entrance = this.findNearestEntrance();
    const resource = entrance ? null : OTZI.resources.findNearestVisibleTarget(this.resourceNodes, this.player, this.map);
    this.focusedEntranceId = entrance ? entrance.id : null;
    this.focusedEntrance = entrance || null;
    this.focusedResourceId = resource ? resource.id : null;
    this.focusedResource = resource || null;
    this.focusedTargetType = entrance ? "entrance" : resource ? "resource" : null;
  },
  tryUse() {
    if (this.transition.active) return false;
    if (this.focusedEntrance) {
      if (this.focusedEntrance.targetScene === "dungeon") {
        this.enterDungeon(this.focusedEntrance.dungeonId);
        return true;
      }
      if (this.focusedEntrance.targetScene === "overworld") {
        this.exitDungeon();
        return true;
      }
    }
    return this.tryGather();
  },
  tryGather() {
    if (this.transition.active) return false;
    const node = this.focusedResourceId ? OTZI.resources.getById(this.resourceNodes, this.focusedResourceId) : null;
    if (!node) {
      OTZI.dialogue.toast("No resource nearby");
      OTZI.audio.blip(220, 0.035);
      return false;
    }
    const stillFocused = OTZI.resources.findNearestVisibleTarget(this.resourceNodes, this.player, this.map);
    if (!stillFocused || stillFocused.id !== node.id || node.depleted) {
      OTZI.dialogue.toast("Move closer to gather");
      OTZI.audio.blip(220, 0.035);
      return false;
    }
    OTZI.inventory.add(node.resource, node.amount);
    OTZI.resources.deplete(node, this.map);
    this.updateFocusState();
    OTZI.dialogue.toast(`Gathered ${node.resource} +1`);
    OTZI.audio.blip(660, 0.04);
    return true;
  },
  maybeTransitionScreen() {
    if (this.transition.active || this.scene !== "overworld" || !this.currentScreen) return false;
    const pad = OTZI.CFG.transitionEdgePad;
    const maxX = this.map.w * OTZI.CFG.tileSize - pad;
    const maxY = this.map.h * OTZI.CFG.tileSize - pad;
    if (this.player.x <= pad && this.currentScreen.exits.w) {
      this.beginScreenTransition("west", this.world.currentX - 1, this.world.currentY, "e", { y: this.player.y });
      return true;
    }
    if (this.player.x >= maxX && this.currentScreen.exits.e) {
      this.beginScreenTransition("east", this.world.currentX + 1, this.world.currentY, "w", { y: this.player.y });
      return true;
    }
    if (this.player.y <= pad && this.currentScreen.exits.n) {
      this.beginScreenTransition("north", this.world.currentX, this.world.currentY - 1, "s", { x: this.player.x });
      return true;
    }
    if (this.player.y >= maxY && this.currentScreen.exits.s) {
      this.beginScreenTransition("south", this.world.currentX, this.world.currentY + 1, "n", { x: this.player.x });
      return true;
    }
    return false;
  },
  update(dt, actions) {
    if (this.transition.active) {
      OTZI.input.clearAll();
      this.updateTransition(dt);
      return;
    }
    if (actions.debugPressed) OTZI.debug.toggle();
    if (actions.mapPressed) {
      this.minimap = !this.minimap;
      if (this.minimap) this.inventoryOpen = false;
      OTZI.dialogue.toast(this.minimap ? "Trail map open" : "Trail map closed");
    }
    if (actions.inventoryPressed) {
      this.inventoryOpen = !this.inventoryOpen;
      if (this.inventoryOpen) this.minimap = false;
      OTZI.dialogue.toast(this.inventoryOpen ? "Pack open" : "Pack closed");
    }
    if (actions.menuPressed) {
      this.menuOpen = !this.menuOpen;
      OTZI.input.clearAll();
      if (this.menuOpen) this.minimap = false;
      if (this.menuOpen) this.inventoryOpen = false;
      OTZI.dialogue.toast(this.menuOpen ? "Craft/Menu opened" : "Craft/Menu closed");
    }
    if (actions.usePressed) this.tryUse();
    if (actions.sprintPressed) {
      OTZI.survival.spendStamina(this.player, 8);
      OTZI.dialogue.toast("Dodge/Sprint burst");
      OTZI.audio.blip(330, 0.035);
    }
    if (this.menuOpen) {
      actions.moveX = 0;
      actions.moveY = 0;
      actions.sprint = false;
    }
    const sprinting = actions.sprint && this.player.stamina > 0;
    const speed = sprinting ? OTZI.CFG.sprintSpeed : OTZI.CFG.playerSpeed;
    OTZI.collision.moveCircle(this.player, actions.moveX * speed * dt, actions.moveY * speed * dt);
    OTZI.survival.update(this.player, dt, sprinting);
    OTZI.entities.update(dt);
    this.maybeTransitionScreen();
    OTZI.camera.update();
    this.updateFocusState();
  }
};

(function boot() {
  let accumulator = 0;
  let lastT = 0;
  let fpsTime = 0;
  let fpsFrames = 0;

  function frame(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(0.1, (t - lastT) / 1000);
    lastT = t;
    accumulator += dt;
    let steps = 0;
    while (accumulator >= OTZI.CFG.fixedDt && steps < OTZI.CFG.maxStepsPerFrame) {
      OTZI.game.update(OTZI.CFG.fixedDt, OTZI.actionMap.sample());
      accumulator -= OTZI.CFG.fixedDt;
      steps++;
    }
    if (steps === OTZI.CFG.maxStepsPerFrame) accumulator = 0;
    OTZI.renderWorld.draw();
    OTZI.renderUi.sync();
    fpsTime += dt;
    fpsFrames++;
    if (fpsTime >= 0.5) {
      OTZI.game.fps = fpsFrames / fpsTime;
      fpsTime = 0;
      fpsFrames = 0;
    }
    requestAnimationFrame(frame);
  }

  function init() {
    OTZI.dom.init();
    OTZI.assets.init();
    OTZI.viewport.init();
    OTZI.game.setSeed(OTZI.CFG.defaultSeed);
    OTZI.input.init();
    OTZI.save.load();
    OTZI.installTestHooks();

    OTZI.dom.startBtn.addEventListener("click", async () => {
      await OTZI.audio.unlock();
      OTZI.dom.startPanel.hidden = true;
      OTZI.game.running = true;
    });
    OTZI.dom.menuCloseBtn.addEventListener("click", () => {
      OTZI.game.menuOpen = false;
      OTZI.input.clearAll();
      OTZI.dialogue.toast("Craft/Menu closed");
    });
    OTZI.dom.craftCrudeToolBtn.addEventListener("click", () => {
      OTZI.crafting.craft("crude_cutting_tool");
    });
    OTZI.dom.resetSaveBtn.addEventListener("click", () => {
      if (!OTZI.game.resetConfirm) {
        OTZI.game.resetConfirm = true;
        OTZI.dialogue.toast("Tap reset again to confirm");
        return;
      }
      OTZI.save.clear();
    });
    OTZI.dom.fullscreenBtn.addEventListener("click", () => {
      OTZI.fullscreen.toggle();
    });

    OTZI.game.running = true;
    requestAnimationFrame(frame);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

  </script>
