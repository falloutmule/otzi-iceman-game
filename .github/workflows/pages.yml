name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify dist artifact
        run: |
          test -f dist/index.html
          grep -q "Start Game" dist/index.html
          grep -q "objectiveBar" dist/index.html
          grep -q "welcomePanel" dist/index.html
          grep -q "minimapLegend" dist/index.html
          grep -q "menuBuildVersion" dist/index.html
          grep -q "saveNowBtn" dist/index.html
          grep -q "exportSaveBtn" dist/index.html
          grep -q "importSaveBtn" dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload dist artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
