name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Verify dist artifact
        run: |
          test -f dist/index.html
          grep -q "Start Game" dist/index.html
          grep -q "objectiveBar" dist/index.html
          grep -q "welcomePanel" dist/index.html
          grep -q "minimapLegend" dist/index.html
          grep -q "menuBuildVersion" dist/index.html
      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
